<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount | Elite Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --forest: #064e3b; --gold: #d4af37; --bg: #fdfdfb; --white: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; }
        
        /* Premium Header */
        header {
            background: linear-gradient(135deg, var(--forest), #022c22);
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--gold); color: white;
        }

        .timer-box { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--gold); font-weight: 700; }

        .main-wrapper { display: flex; justify-content: center; padding: 60px 20px; }
        .premium-card { background: var(--white); border-radius: 32px; width: 100%; max-width: 650px; padding: 50px; box-shadow: 0 20px 50px rgba(6, 78, 59, 0.15); }

        .q-badge { background: #fdfaf0; color: #856404; padding: 6px 16px; border-radius: 10px; font-weight: 800; font-size: 0.75rem; margin-bottom: 15px; display: inline-block; }
        .q-text { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--forest); margin-bottom: 35px; }

        .option-card {
            padding: 20px; border: 2px solid #f3f4f6; border-radius: 20px; margin-bottom: 15px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 20px;
        }
        .option-card.selected { border-color: var(--gold); background: #fdfaf0; }
        .dot { width: 14px; height: 14px; border: 2px solid #d1d5db; border-radius: 50%; }
        .selected .dot { background: var(--gold); border-color: var(--gold); }

        .nav-group { display: flex; gap: 20px; margin-top: 40px; }
        .btn-next { flex: 1; padding: 18px; background: var(--forest); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }
        .btn-prev { flex: 1; padding: 18px; border: 2px solid var(--forest); color: var(--forest); background: transparent; border-radius: 16px; font-weight: 700; cursor: pointer; }

        #login-section, #waiting-screen { text-align: center; }
        input, select { width: 100%; padding: 16px; border: 2px solid #e5e7eb; border-radius: 16px; margin-bottom: 20px; box-sizing: border-box;}
    </style>
</head>
<body>

    <header>
        <div style="font-family: 'Playfair Display', serif; font-size: 1.5rem;" id="displayTitle">PARAMOUNT</div>
        <div class="timer-box" id="timerDisplay">Time: --:--</div>
    </header>

    <div class="main-wrapper">
        <div class="premium-card">
            
            <!-- 1. LOGIN -->
            <div id="login-section">
                <h2 style="font-family: 'Playfair Display', serif; color: var(--forest);">Student Login</h2>
                <input type="text" id="studentName" placeholder="Full Name">
                <input type="text" id="rollNo" placeholder="Roll Number">
                <select id="studentClass">
                    <option value="" disabled selected>Select Grade</option>
                    <option value="Pre-KG">Pre-KG</option>
                            <option value="LKG">LKG</option>
                            <option value="UKG">UKG</option>
                            <option value="Grade 1">Grade 1</option>
                            <option value="Grade 2">Grade 2</option>
                            <option value="Grade 3">Grade 3</option>
                            <option value="Grade 4">Grade 4</option>
                            <option value="Grade 5">Grade 5</option>
                            <option value="Grade 6">Grade 6</option>
                            <option value="Grade 7">Grade 7</option>
                            <option value="Grade 8">Grade 8</option>
                </select>
                <button class="btn-next" style="width: 100%;" onclick="handleLogin()">JOIN ASSESSMENT</button>
            </div>

            <!-- 2. WAITING -->
            <div id="waiting-screen" style="display: none;">
                <i class="fa-solid fa-crown fa-beat" style="font-size: 4rem; color: var(--gold); margin: 30px 0;"></i>
                <h2 style="font-family: 'Playfair Display', serif; color: var(--forest);">Waiting for Quiz...</h2>
                <p>The assessment for your class will load automatically.</p>
            </div>

            <!-- 3. QUIZ -->
            <div id="quiz-section" style="display: none;">
                <div class="q-badge" id="qNumber">QUESTION 1</div>
                <div class="q-text" id="questionTitle">Loading Question...</div>
                <div id="optionsContainer"></div>
                <div class="nav-group">
                    <button class="btn-prev" id="prevBtn" onclick="changeQuestion(-1)">PREVIOUS</button>
                    <button class="btn-next" id="nextBtn" onclick="changeQuestion(1)">CONTINUE</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
            authDomain: "paramount-school-d55bc.firebaseapp.com",
            projectId: "paramount-school-d55bc",
            storageBucket: "paramount-school-d55bc.firebasestorage.app",
            messagingSenderId: "130979432562",
            appId: "1:130979432562:web:4cd94787b23f9daba51aeb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let quizData = null;
        let currentIdx = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let localAnswers = {};

        window.handleLogin = function() {
            const name = document.getElementById('studentName').value;
            const roll = document.getElementById('rollNo').value;
            const sClass = document.getElementById('studentClass').value;

            if(!name || !sClass) return alert("Fill all fields");
            currentUser = { name, roll, sClass };
            
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('waiting-screen').style.display = 'block';

            startLiveListener(sClass);
        };

        function startLiveListener(targetClass) {
            onSnapshot(doc(db, "live_quizzes", targetClass), (snapshot) => {
                if (snapshot.exists()) {
                    quizData = snapshot.data();
                    if (quizData.isLive) {
                        startQuiz();
                    }
                }
            });
        }

        function startQuiz() {
            document.getElementById('waiting-screen').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            document.getElementById('displayTitle').innerText = quizData.title;
            
            // Set Timer
            if (!timerInterval) {
                timeLeft = quizData.duration * 60;
                startTimer();
            }
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `Time: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up!");
                    location.reload();
                }
                timeLeft--;
            }, 1000);
        }

        function renderQuestion() {
            const q = quizData.questions[currentIdx];
            document.getElementById('qNumber').innerText = `QUESTION ${currentIdx + 1} OF ${quizData.questions.length}`;
            document.getElementById('questionTitle').innerText = q.text;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";

            q.options.forEach((opt, i) => {
                const isSelected = localAnswers[currentIdx] === i;
                const div = document.createElement('div');
                div.className = `option-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `<div class="dot"></div><span>${opt}</span>`;
                div.onclick = () => selectOption(i);
                container.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = (currentIdx === 0);
            document.getElementById('nextBtn').innerText = (currentIdx === quizData.questions.length -1) ? "FINISH" : "CONTINUE";
        }

        window.selectOption = function(i) {
            localAnswers[currentIdx] = i;
            renderQuestion();
        };

        window.changeQuestion = function(step) {
            if (currentIdx + step >= 0 && currentIdx + step < quizData.questions.length) {
                currentIdx += step;
                renderQuestion();
            } else if (currentIdx + step === quizData.questions.length) {
                submitQuiz();
            }
        };

        async function submitQuiz() {
            if(confirm("Submit Assessment?")) {
                alert("Submitted Successfully!");
                location.reload();
            }
        }
    </script>
</body>
</html>
