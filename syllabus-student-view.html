<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>View Syllabus | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #004d26; --gold: #ffd700; --light: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f1; margin: 0; min-height: 100vh; }

        /* --- HEADER --- */
        header { background: var(--forest); color: white; padding: 12px 3%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 100%; }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; }
        .header-logo { height: clamp(45px, 8vw, 60px); width: auto; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1rem, 4.5vw, 1.8rem); font-weight: 800; letter-spacing: 1px; margin: 0; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.5rem, 2vw, 0.8rem); color: var(--gold); font-weight: 700; text-transform: uppercase; margin: 0; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* --- SELECTION CARD --- */
        .search-card { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--forest);
            margin-bottom: 20px; text-align: center;
        }
        .search-card h2 { font-family: 'Montserrat'; color: var(--forest); margin-top: 0; font-size: 1.2rem; }
        
        .flex-row { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        @media (min-width: 600px) { .flex-row { flex-direction: row; } }

        .input-group { flex: 1; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #666; margin-bottom: 5px; margin-left: 5px; }
        select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee; 
            font-size: 15px; font-weight: 600; outline: none; background: #fafafa;
            transition: 0.3s; cursor: pointer;
        }
        select:focus { border-color: var(--forest); background: white; }

        /* --- SYLLABUS DISPLAY --- */
        #syllabusDisplay { display: none; }
        .subject-card { 
            background: white; border-radius: 15px; margin-bottom: 15px; 
            overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 5px solid var(--forest);
        }
        .subject-header { 
            background: #f9f9f9; padding: 12px 20px; font-family: 'Montserrat'; 
            font-weight: 800; font-size: 14px; color: var(--forest);
            display: flex; justify-content: space-between; border-bottom: 1px solid #eee;
        }
        .subject-body { padding: 15px 20px; font-size: 15px; line-height: 1.6; color: #333; white-space: pre-wrap; }

        .no-data { text-align: center; padding: 40px; color: #888; font-weight: 600; }
        .update-tag { font-size: 10px; color: #999; text-align: center; margin-bottom: 20px; display: block; }
        
        .btn-print {
            width: 100%; background: #333; color: white; padding: 15px; border-radius: 50px;
            border: none; font-family: 'Montserrat'; font-weight: 800; text-transform: uppercase;
            margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        @media print {
            .search-card, .btn-print, header { display: none !important; }
            body { background: white; }
            .subject-card { border: 1px solid #ccc; break-inside: avoid; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="search-card">
        <h2><i class="fas fa-search"></i> Check Exam Syllabus</h2>
        <div class="flex-row">
            <div class="input-group">
                <label>Select Class</label>
                <select id="viewClass" onchange="fetchSyllabus()">
                    <option value="">-- Choose --</option>
                    <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
                    <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
                    <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                    <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
                    <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
                    <option value="Grade-8">Grade-8</option>
                </select>
            </div>
            <div class="input-group">
                <label>Select Exam</label>
                <select id="viewExam" onchange="fetchSyllabus()">
                    <option value="">-- Choose --</option>
                    <option value="Unit Test-1">Unit Test-1</option>
                    <option value="Unit Test-2">Unit Test-2</option>
                    <option value="Quarterly">Quarterly</option>
                    <option value="Half-Yearly">Half-Yearly</option>
                    <option value="Annual">Annual</option>
                </select>
            </div>
        </div>
    </div>

    <span id="lastUpdated" class="update-tag"></span>

    <div id="syllabusDisplay">
        <div id="cardsContainer"></div>
        <button class="btn-print" onclick="window.print()">
            <i class="fas fa-print"></i> Download / Print Syllabus
        </button>
    </div>

    <div id="emptyState" class="no-data">
        <i class="fas fa-book-reader fa-3x" style="margin-bottom:15px; opacity:0.3;"></i><br>
        Select your Class and Exam to view content.
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    async function fetchSyllabus() {
        const cls = document.getElementById('viewClass').value;
        const exam = document.getElementById('viewExam').value;
        const container = document.getElementById('cardsContainer');
        const display = document.getElementById('syllabusDisplay');
        const empty = document.getElementById('emptyState');
        const updateTag = document.getElementById('lastUpdated');

        if(!cls || !exam) {
            display.style.display = "none";
            empty.style.display = "block";
            return;
        }

        const snap = await db.ref(`class_syllabus/${cls}/${exam}`).once('value');
        const data = snap.val();

        container.innerHTML = "";
        
        if(!data) {
            display.style.display = "none";
            empty.innerHTML = `<i class="fas fa-exclamation-circle fa-2x"></i><br><br>Syllabus not yet uploaded for ${cls} ${exam}.`;
            empty.style.display = "block";
            updateTag.innerText = "";
            return;
        }

        empty.style.display = "none";
        display.style.display = "block";
        updateTag.innerText = `Last Verified: ${data.lastUpdatedTime || 'Recently'}`;

        // Loop through subjects (excluding metadata)
        Object.keys(data).forEach(key => {
            if(key !== "lastUpdatedBy" && key !== "lastUpdatedTime" && data[key].trim() !== "") {
                const card = `
                    <div class="subject-card">
                        <div class="subject-header">
                            <span>${key.toUpperCase()}</span>
                            <i class="fas fa-chevron-right" style="font-size:10px; opacity:0.5;"></i>
                        </div>
                        <div class="subject-body">${data[key]}</div>
                    </div>
                `;
                container.innerHTML += card;
            }
        });

        if(container.innerHTML === "") {
             display.style.display = "none";
             empty.innerHTML = "Syllabus content is empty.";
             empty.style.display = "block";
        }
    }
</script>
</body>
</html>
