<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Sign-Up | Paramount English Medium School</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #34495e;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .section-divider {
            border-top: 2px solid #eee;
            margin: 1.5rem 0;
            padding-top: 1rem;
        }
        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #7f8c8d;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Event Registration</h2>
    <form action="/submit-signup" method="POST">
        
        <div class="form-group">
            <label for="studentName">Student Name</label>
            <input type="text" id="studentName" name="studentName" value="Shaik Tauseef Ali" readonly>
        </div>

        <div class="form-group">
            <label for="event">Select Event</label>
            <select id="event" name="event" required>
                <option value="">-- Choose an Event --</option>
                <option value="annual-day">Annual Day 2026</option>
                <option value="sports-meet">Inter-School Sports Meet</option>
                <option value="science-fair">Science & Tech Expo</option>
            </select>
        </div>

        <div class="section-divider">
            <span class="section-title">Attendance</span>
            <div class="form-group">
                <label for="attendance-type">Participation Mode</label>
                <select id="attendance-type" name="attendance-type">
                    <option value="present">In-Person (Full Day)</option>
                    <option value="remote">Online Contributor</option>
                </select>
            </div>
        </div>

        <div class="section-divider">
            <span class="section-title">Finance</span>
            <div class="form-group">
                <label for="fee">Registration Fee</label>
                <input type="text" id="fee" name="fee" value="₹500.00" disabled>
            </div>
            <div class="form-group">
                <label for="payment-method">Payment Status</label>
                <select id="payment-method" name="payment-method">
                    <option value="pending">Pay at Counter</option>
                    <option value="online">Online Payment (UPI/Card)</option>
                </select>
            </div>
        </div>

        <button type="submit">Confirm Registration</button>
    </form>
</div>

</body>
</html>
