<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #004d26; --gold: #ffd700; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        
        /* Premium Dashboard Button Styling */
        .btn-back-dash {
            text-decoration: none;
            color: var(--forest);
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: 2px solid #f0f0f0;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-back-dash i {
            background: var(--forest);
            color: var(--gold);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 10px;
            transition: 0.3s;
        }

        .btn-back-dash:hover {
            border-color: var(--forest);
            color: var(--forest);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 102, 51, 0.15);
        }

        .btn-back-dash:hover i {
            transform: rotate(-360deg);
            background: var(--gold);
            color: var(--forest);
        }

        .reg-card { max-width: 500px; margin: 20px auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fafafa; padding: 15px 20px; border-radius: 20px; border: 1px solid #eee; }

        .school-header-row { display: flex; align-items: center; gap: 15px; }
        .school-logo-img { height: 40px; }
        .school-text-box { display: flex; flex-direction: column; line-height: 1.1; }
        .school-name-main { font-family: 'Montserrat'; font-size: 1rem; font-weight: 800; color: var(--forest); }
        .school-name-sub { font-size: 0.65rem; color: #b8860b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .header { text-align: center; margin-bottom: 25px; }
        h2 { color: var(--forest); font-family: 'Montserrat'; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; margin-bottom: 6px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee; font-size: 14px; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--forest); background: #f9fdfa; }
        
        .btn-reg { width: 100%; background: var(--forest); color: white; padding: 16px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-reg:hover { background: #002b15; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="top-bar">
        <div class="school-header-row">
            <img src="logo.png" class="school-logo-img">
            <div class="school-text-box">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">Student Portal</span>
            </div>
        </div>
        
        <a href="Student Portal.html" class="btn-back-dash">
            <span>Back To Home</span>
            <i class="fas fa-home"></i>
        </a>
    </div>

    <div class="header">
        <h2>Event Registration</h2>
        <p style="font-size: 12px; color: #666; font-weight: 600;">Participate & Excel</p>
    </div>

    <div class="input-group">
        <label>Select Event</label>
        <select id="eventSelector">
            <option value="">-- Choose Upcoming Event --</option>
        </select>
    </div>

    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="nameInput" placeholder="Enter student name">
    </div>

    <div class="input-group">
        <label>Class & Section</label>
        <select id="classInput">
            <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
            <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
            <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
            <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
            <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
            <option value="Grade-8">Grade-8</option>
        </select>
    </div>

    <div class="input-group">
        <label>Roll Number</label>
        <input type="number" id="rollInput" placeholder="e.g. 1472070">
    </div>

    <div class="input-group">
        <label>Parent Contact Number</label>
        <input type="tel" id="phoneInput" placeholder="Enter phone number">
    </div>

    <button class="btn-reg" onclick="registerStudent()">Submit Entry <i class="fas fa-paper-plane"></i></button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('school_events').on('value', snap => {
        const selector = document.getElementById('eventSelector');
        selector.innerHTML = '<option value="">-- Choose Upcoming Event --</option>';
        const now = new Date().getTime();
        snap.forEach(child => {
            const ev = child.val();
            const deadline = ev.regDeadline ? new Date(ev.regDeadline).getTime() : new Date(ev.date).getTime();
            if (now < deadline) {
                selector.innerHTML += `<option value="${ev.name}">${ev.name}</option>`;
            }
        });
    });

    function registerStudent() {
        const eventName = document.getElementById('eventSelector').value;
        const roll = document.getElementById('rollInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const cls = document.getElementById('classInput').value;
        const phone = document.getElementById('phoneInput').value;

        if (!eventName || !roll || !name) {
            return Swal.fire('Note', 'Please fill all required fields', 'info');
        }

        db.ref('school_events').orderByChild('name').equalTo(eventName).once('value', snap => {
            let eventData;
            snap.forEach(c => eventData = c.val());
            if(!eventData) return;
            const now = new Date().getTime();
            const deadline = eventData.regDeadline ? new Date(eventData.regDeadline).getTime() : new Date(eventData.date).getTime();

            if (now > deadline) {
                Swal.fire('Expired', 'Registration is closed.', 'error');
                return;
            }

            const entry = { roll, name, cls, phone, timestamp: new Date().toISOString() };
            db.ref(`event_registrations/${eventName}/${roll}`).set(entry).then(() => {
                Swal.fire({
                    title: 'Successfully Registered!',
                    text: 'Confirmed! Check your profile for the stamp.',
                    icon: 'success',
                    confirmButtonColor: '#004d26'
                }).then(() => { location.reload(); });
            });
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const eventParam = params.get('event');
        if (eventParam) {
            setTimeout(() => {
                const selector = document.getElementById('eventSelector');
                if (selector) selector.value = eventParam;
            }, 1000);
        }
    });
</script>
</body>
</html>
