<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Progress | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; --danger: #e53935; --premium-gradient: linear-gradient(135deg, #006633 0%, #004d26 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f1; margin: 0; padding-bottom: 120px; width: 100%; overflow-x: hidden; }
        
        .portal-nav { background: #004d26; padding: 12px; display: flex; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 2000; }
        .portal-nav a { color: white; text-decoration: none; font-weight: bold; font-size: 12px; padding: 8px 15px; border-radius: 25px; }
        .portal-nav a.active { background: rgba(255,255,255,0.2); border: 1px solid var(--gold); color: var(--gold); }

        header { background: var(--forest); color: white; padding: 20px 10px; border-bottom: 4px solid var(--gold); text-align: center; }
        .header-content { display: flex; flex-direction: column; align-items: center; gap: 10px; max-width: 1200px; margin: 0 auto; }
        .header-logo { height: 60px; width: auto; }
        .school-text { display: flex; flex-direction: column; line-height: 1.2; align-items: center; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }

        .container { width: 100%; max-width: 900px; margin: 15px auto; padding: 0 8px; }
        .card { background: white; padding: 15px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); margin-bottom: 20px; border-top: 6px solid var(--forest); }
        
        .search-area { position: relative; display: flex; align-items: center; margin-bottom: 15px; }
        input { width: 100%; padding: 16px 20px; border-radius: 50px; border: 2px solid #eee; outline: none; font-size: 16px; }
        .btn-search { position: absolute; right: 8px; background: var(--forest); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .toggle-container { display: flex; gap: 8px; margin-bottom: 20px; flex-direction: column; }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #eee; background: #fff; font-weight: 700; }
        .btn-premium { background: var(--premium-gradient); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* CIRCULAR PHOTO FIX */
        .photo-container { width: 85px; height: 85px; border-radius: 50%; overflow: hidden; background: #eee; border: none !important; margin-right: 15px; }
        .student-photo { width: 100%; height: 100%; object-fit: cover; }

        /* BADGE ANIMATION */
        #vBadges { margin-top: 10px; display: flex; justify-content: flex-start; }
        .badge-ui { 
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #000; padding: 6px 16px; border-radius: 50px; font-size: 10px; font-weight: 900; 
            text-transform: uppercase; border: 1px solid #fff; display: inline-flex; align-items: center; gap: 6px;
            animation: badgePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            position: relative; overflow: hidden;
        }
        .badge-ui::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(30deg); animation: badgeShine 3s infinite;
        }
        @keyframes badgePop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes badgeShine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

        .report-header { display: none; align-items: center; margin-bottom: 20px; background: #fcfdfc; padding: 15px; border-radius: 20px; border: 1px solid #edf2ef; }
        .student-meta h2 { color: var(--forest); margin: 0; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; }

        .results-container { display: none; width: 100%; }
        #subjectGrid { display: flex; flex-direction: column; gap: 5px; border: 1px solid #eee; border-radius: 20px; padding: 10px; background: white; }
        .subj-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f9f9f9; font-weight: 700; font-size: 14px; }
        
        #allExamsContainer { width: 100%; margin-top: 15px; overflow-x: auto; display: none; }
        .cumulative-view { width: 100%; border-collapse: collapse; min-width: 500px; text-align: center; }
        .cumulative-view th { background: var(--forest); color: white; padding: 10px; font-size: 10px; border: 1px solid #004d26; }
        .cumulative-view td { padding: 10px; border: 1px solid #eee; font-weight: 700; font-size: 11px; background: white; }

        .hw-box { background: #fffde7; padding: 15px; border-radius: 15px; border-left: 5px solid #fbc02d; font-style: italic; font-size: 14px; }
        .summary-dashboard { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .stat-ring-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #f0f0f0; }
        .stat-value { font-size: 22px; font-weight: 900; color: var(--forest); display: block; margin-top: 5px; }
        .grade-highlight-box { background: var(--premium-gradient); color: white; padding: 25px; border-radius: 20px; text-align: center; }

        @media (min-width: 768px) {
            .report-header { display: flex; }
            #subjectGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .summary-dashboard { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>

<div class="portal-nav" id="noPrintNav">
    <a href="Student Portal.html">Profile</a>
    <a href="progres.html" class="active">Progress</a>
    <a href="homework.html">Homework</a>
</div>

<div id="printableArea">
    <header id="pdfHeader">
        <div class="header-content">
            <img src="logo.png" class="header-logo">
            <div class="school-text">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>
            <div style="font-weight: 800; margin-top: 10px;">ACADEMIC PROGRESS REPORT</div>
        </div>
    </header>

    <div class="container">
        <div class="card" id="pdfCard">
            <div id="searchControls">
                <div class="search-area">
                    <input type="text" id="rollNo" placeholder="Enter Student Roll No">
                    <button class="btn-search" onclick="fetchResults()"><i class="fas fa-search"></i></button>
                </div>
                <div class="toggle-container">
                    <select id="examType" onchange="fetchResults()">
                        <option value="FA-1">FA-1 Exam</option><option value="FA-2">FA-2 Exam</option>
                        <option value="FA-3">FA-3 Exam</option><option value="SA-1">SA-1 Exam</option>
                        <option value="SA-2">SA-2 Exam</option>
                    </select>
                    <button id="toggleBtn" class="btn-premium" onclick="toggleCumulative()">
                        <i class="fas fa-layer-group"></i> ALL EXAMS VIEW
                    </button>
                </div>
            </div>

            <div id="reportProfile" class="report-header">
                <div class="photo-container"><img id="studentPhoto" src="logo.png" class="student-photo"></div>
                <div class="student-meta">
                    <h2 id="dispName">STUDENT NAME</h2>
                    <p id="dispClass">CLASS</p>
                    <p id="dispRoll" style="color:var(--forest); font-weight:800; font-size:12px;">ROLL: ---</p>
                    <div id="vBadges"></div>
                </div>
            </div>

            <div id="singleResults" class="results-container">
                <div id="subjectGrid">
                    <div id="col1"></div>
                    <div id="col2"></div>
                </div>
                <div class="graph-section"><canvas id="marksGraph"></canvas></div>
            </div>

            <div id="allExamsContainer">
                <table class="cumulative-view">
                    <thead><tr><th>Subject</th><th>FA-1</th><th>FA-2</th><th>FA-3</th><th>SA-1</th><th>SA-2</th></tr></thead>
                    <tbody id="allExamsBody"></tbody>
                </table>
            </div>

            <div class="card" id="hwCard" style="display:none; border-top-color:#fbc02d;">
                <h3><i class="fas fa-book"></i> Today's Homework</h3>
                <div id="vHW" class="hw-box">No data.</div>
            </div>

            <div id="summaryArea" class="results-container">
                <div class="summary-dashboard">
                    <div class="stat-ring-card">TOTAL MARKS<span id="resTotal" class="stat-value">-</span></div>
                    <div class="stat-ring-card">PERCENTAGE<span id="resPerc" class="stat-value">-</span></div>
                    <div class="grade-highlight-box"><label style="font-size:10px; opacity:0.8;">GRADE</label><span id="resGrade" style="font-size:30px; font-weight:900; display:block; color:var(--gold);">-</span></div>
                </div>
            </div>
            
            <div id="noData" style="text-align:center; padding: 20px; display: none; color: #999;">Roll Number not found.</div>
        </div>
    </div>
</div>

    let chartObj;
    let isCumulative = false;

    function getGradeSubjects(className) {
        if (["Grade-6", "Grade-7", "Grade-8"].includes(className)) return ["TEL", "HIN", "ENG", "MAT", "PHY", "CHE", "BIO", "SOC", "IIT"];
        if (className === "Grade-5") return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC", "IIT"];
        return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC"];
    }

    function toggleCumulative() {
        if(!isCumulative) fetchAllExams();
        else fetchResults();
    }

    async function fetchResults() {
        isCumulative = false;
        document.getElementById('toggleBtn').innerHTML = '<i class="fas fa-layer-group"></i> All Exams View';
        document.getElementById('allExamsContainer').style.display = 'none';
        
        const roll = document.getElementById('rollNo').value.trim();
        const exam = document.getElementById('examType').value;
        const student = students[roll];

        if(!student) { if(roll) document.getElementById('noData').style.display = 'block'; return; }
        document.getElementById('noData').style.display = 'none';

        db.ref(`progress_cards/${student.Class}/${exam}/${student.Name}`).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('reportProfile').style.display = 'flex';
            document.getElementById('dispName').innerText = student.Name;
            document.getElementById('dispClass').innerText = student.Class;
            document.getElementById('dispRoll').innerText = `Roll Number: ${roll}`;
            document.getElementById('studentPhoto').src = `students/${roll}.png`;

            if(data) {
                document.getElementById('singleResults').style.display = 'block';
                document.getElementById('summaryArea').style.display = 'block';
                document.getElementById('pdfBtn').style.display = 'block';
                document.getElementById('hwCard').style.display = 'block';

                const subjects = getGradeSubjects(student.Class);
                const m = data.marks || {};
                document.getElementById('col1').innerHTML = ""; document.getElementById('col2').innerHTML = "";
                const half = Math.ceil(subjects.length / 2);
                
                subjects.forEach((sub, idx) => {
                    const mark = m[sub] !== undefined ? m[sub] : '-';
                    const row = `<div class="subj-item"><span>${sub}</span><span>${mark}</span></div>`;
                    if(idx < half) document.getElementById('col1').innerHTML += row;
                    else document.getElementById('col2').innerHTML += row;
                });

                if(chartObj) chartObj.destroy();
                const ctx = document.getElementById('marksGraph').getContext('2d');
                chartObj = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: subjects, datasets: [{ data: subjects.map(s => m[s] || 0), backgroundColor: '#006633' }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });

                document.getElementById('resTotal').innerText = data.total;
                document.getElementById('resPerc').innerText = data.percentage + "%";
                document.getElementById('resGrade').innerText = data.grade;
            }
        });

        // BADGE FETCH
        db.ref(`exam_results/${student.Class}/${student.Name}`).once('value', (snap) => {
            const res = snap.val();
            const badgeBox = document.getElementById('vBadges');
            badgeBox.innerHTML = "";
            if(res && res.badge) {
                badgeBox.innerHTML = `<div class="badge-ui"><i class="fas fa-crown"></i> ${res.badge}</div>`;
            }
        });

        // HOMEWORK FETCH
        const today = new Date().toISOString().split('T')[0];
        db.ref(`homework/${student.Class}`).once('value', snap => {
            const hwData = snap.val() || {};
            document.getElementById('vHW').innerText = hwData[today] || "No homework assigned today.";
        });
    }

    async function fetchAllExams() {
        const roll = document.getElementById('rollNo').value.trim();
        const student = students[roll];
        if(!student) return;
        isCumulative = true;
        document.getElementById('toggleBtn').innerHTML = '<i class="fas fa-undo"></i> Single View';
        document.getElementById('singleResults').style.display = 'none';

        db.ref(`progress_cards/${student.Class}`).once('value', (snap) => {
            const classData = snap.val() || {};
            const subjects = getGradeSubjects(student.Class);
            const exams = ["FA-1", "FA-2", "FA-3", "SA-1", "SA-2"];
            let tableHtml = "";
            subjects.forEach(sub => {
                let row = `<tr><td style="text-align:left; padding-left:10px;">${sub}</td>`;
                exams.forEach(ex => {
                    let mark = (classData[ex] && classData[ex][student.Name]) ? classData[ex][student.Name].marks[sub] : '-';
                    row += `<td>${mark}</td>`;
                });
                tableHtml += row + `</tr>`;
            });
            document.getElementById('allExamsBody').innerHTML = tableHtml;
            document.getElementById('allExamsContainer').style.display = 'block';
        });
    }

    async function downloadReport() {
        const canvas = await html2canvas(document.getElementById('printableArea'), { scale: 2 });
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`${document.getElementById('dispName').innerText}_Progress.pdf`);
    }
</script>
