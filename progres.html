    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }

        /* --- WEB VIEW HEADER --- */
        header { background: var(--forest); color: white; padding: 15px 4%; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header-logo { height: 45px; }
        .btn-exit { background: rgba(255,255,255,0.1); border: 1.5px solid white; color: white; padding: 5px 15px; border-radius: 50px; font-size: 10px; font-weight: 800; cursor: pointer; }

        /* --- SEARCH AREA --- */
        .search-card { background: white; max-width: 800px; margin: 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        input, select { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; margin: 5px; width: 200px; font-weight: 600; }
        .btn-view { background: var(--forest); color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-pdf { background: #e67e22; color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* --- ON-SCREEN PREVIEW --- */
        #dataPreview { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; display: none; }
        .preview-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-weight: 700; color: #333; }

        /* --- PDF EXCLUSIVE TEMPLATE (Hidden from Screen) --- */
        #pdfExportTemplate { 
            position: absolute; left: -9999px; top: 0;
            width: 850px; background: white; padding: 50px; 
            border: 15px double var(--forest); box-sizing: border-box; 
        }
        .pdf-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--forest); padding-bottom: 15px; margin-bottom: 25px; }
        .pdf-school-name { text-align: center; flex-grow: 1; }
        .pdf-school-name h1 { margin: 0; font-family: 'Montserrat'; color: var(--forest); font-size: 2.5rem; letter-spacing: 1px; }
        .pdf-school-name p { margin: 0; color: var(--gold); font-weight: 800; letter-spacing: 3px; font-size: 11px; }
        .pdf-badge { background: black; color: white; padding: 6px 20px; border-radius: 5px; font-size: 13px; font-weight: 800; margin-top: 12px; display: inline-block; border: 1px solid #444; }
        
        .pdf-student-box { display: flex; gap: 30px; background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 25px; align-items: center; border: 1px solid #e2e8f0; position: relative; }
        .pdf-photo { width: 110px; height: 130px; border: 3px solid var(--forest); border-radius: 10px; object-fit: cover; background: white; }
        
        .pdf-marks-grid { display: grid; grid-template-columns: 1.3fr 0.9fr; gap: 20px; margin-top: 20px; }
        .pdf-table { width: 100%; border-collapse: collapse; }
        .pdf-table th { background: var(--forest); color: white; padding: 10px; font-size: 10px; border: 1px solid var(--forest); text-transform: uppercase; }
        .pdf-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-weight: 700; font-size: 12px; }
        .pdf-table td:first-child { text-align: left; background: #f8faf9; padding-left: 15px; color: var(--forest); }
        
        .pdf-footer-row { display: flex; justify-content: space-around; margin-top: 30px; gap: 15px; }
        .pdf-stat-card { border: 2px solid var(--forest); padding: 15px; border-radius: 12px; text-align: center; flex: 1; background: white; }
        .pdf-stat-card b { display: block; font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .pdf-stat-card span { font-size: 1.6rem; font-weight: 900; color: var(--forest); }
        
        .pdf-signatures { display: flex; justify-content: space-between; margin-top: 80px; padding: 0 10px; }
        .pdf-sig-box { border-top: 2.5px solid #334155; width: 30%; text-align: center; padding-top: 10px; font-weight: 800; font-size: 12px; color: #334155; }
    </style>
</head>

    function getGradeSubjects(className) {
        if (["Grade-6", "Grade-7", "Grade-8"].some(g => className.includes(g))) return ["TEL", "HIN", "ENG", "MAT", "PHY", "BIO", "SOC"];
        return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC"];
    }

    async function generateReport() {
        const roll = document.getElementById('rollInput').value.trim();
        const exam = document.getElementById('examSelect').value;
        const student = students[roll];

        if (!student) { Swal.fire('Error', 'Roll Number not found.', 'error'); return; }

        Swal.fire({ title: 'Loading...', didOpen: () => Swal.showLoading() });

        try {
            const dbClass = student.Class.split(' (')[0].trim();
            const snap = await db.ref(`progress_cards/${dbClass}/${exam}/${student.Name}`).once('value');
            const data = snap.val();

            if (!data) { Swal.fire('Not Found', 'Data not uploaded yet.', 'info'); return; }

            // Web Preview
            document.getElementById('viewTitle').innerText = `${student.Name.toUpperCase()} - ${exam}`;
            let previewHtml = "";
            const marksSource = data.marks ? data.marks : data;
            const subjects = getGradeSubjects(student.Class);
            
            subjects.forEach(sub => {
                let score = marksSource[sub];
                if (typeof score === 'object') score = (parseInt(score.ext)||0) + (parseInt(score.int)||0);
                previewHtml += `<div class="preview-row"><span>${sub}</span><span>${score || 0}</span></div>`;
            });
            previewHtml += `<div class="preview-row" style="color:var(--forest); border:none;"><span>TOTAL</span><span>${data.total}</span></div>`;
            document.getElementById('viewResults').innerHTML = previewHtml;
            document.getElementById('dataPreview').style.display = 'block';

            // Hidden PDF Prep
            document.getElementById('pdfName').innerText = student.Name.toUpperCase();
            document.getElementById('pdfClass').innerText = "CLASS: " + student.Class;
            document.getElementById('pdfRoll').innerText = "ROLL NO: " + roll;
            document.getElementById('pdfExamBadge').innerText = exam;
            document.getElementById('pdfPhoto').src = `students/${roll}.png`;

            const isSenior = ["Grade-6", "Grade-7", "Grade-8"].some(g => student.Class.includes(g));
            const isFA = exam.includes("FORMATIVE");
            const maxM = isFA ? 50 : 100;
            const maxE = isFA ? 40 : 80;
            const maxI = isFA ? 10 : 20;

            let hHtml = `<tr><th>Subject</th>${isSenior ? '<th>Ext</th><th>Int</th>' : ''}<th>Scored / Max</th></tr>`;
            document.getElementById('pdfTHead').innerHTML = hHtml;

            let bHtml = "";
            let gLabels = [], gExt = [], gInt = [];
            subjects.forEach(sub => {
                bHtml += `<tr><td>${sub}</td>`;
                if(isSenior) {
                    const e = parseInt(marksSource[sub]?.ext || marksSource[sub] || 0);
                    const i = parseInt(marksSource[sub]?.int || 0);
                    bHtml += `<td>${e}/${maxE}</td><td>${i}/${maxI}</td><td>${e+i}/${maxM}</td>`;
                    gExt.push(e); gInt.push(i);
                } else {
                    const sc = parseInt(marksSource[sub]||0);
                    bHtml += `<td>${sc}/${maxM}</td>`;
                    gExt.push(sc);
                }
                gLabels.push(sub);
                bHtml += `</tr>`;
            });
            document.getElementById('pdfTBody').innerHTML = bHtml;
            document.getElementById('pdfTotal').innerText = `${data.total} / ${subjects.length * maxM}`;
            document.getElementById('pdfPerc').innerText = data.percentage + "%";
            document.getElementById('pdfGrade').innerText = data.grade;

            // Chart
            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('miniGraph').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: gLabels,
                    datasets: isSenior ? [
                        { label: 'External', data: gExt, backgroundColor: '#006633' },
                        { label: 'Internal', data: gInt, backgroundColor: '#ffd700' }
                    ] : [{ label: 'Marks', data: gExt, backgroundColor: '#006633' }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    scales: { y: { beginAtZero: true, max: maxM } },
                    plugins: { legend: { display: isSenior, labels: { font: { size: 10 } } } }
                }
            });

            Swal.close();
        } catch (e) { console.error(e); Swal.fire('Error', 'Sync Failure', 'error'); }
    }

    async function downloadPDF() {
        const report = document.getElementById('pdfExportTemplate');
        if (document.getElementById('pdfName').innerText === "STUDENT NAME") {
            Swal.fire('Info', 'View data first!', 'info'); return;
        }

        Swal.fire({ title: 'Generating PDF...', didOpen: () => Swal.showLoading() });
        const canvas = await html2canvas(report, { scale: 3, useCORS: true });
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        
        const margin = 10;
        const pdfW = pdf.internal.pageSize.getWidth() - (margin * 2);
        const pdfH = (canvas.height * pdfW) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', margin, margin, pdfW, pdfH);
        pdf.save(`${document.getElementById('pdfName').innerText}_Report.pdf`);
        Swal.close();
    }
