<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Progress | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; --danger: #e53935; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; }
        
        .portal-nav { background: #004d26; padding: 12px; display: flex; justify-content: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 2000; }
        .portal-nav a { color: white; text-decoration: none; font-weight: bold; font-size: 12px; padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; gap: 6px; }
        .portal-nav a.active { background: rgba(255,255,255,0.2); border: 1px solid var(--gold); color: var(--gold); }

        header { background: var(--forest); color: white; padding: 25px 3%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(55px, 8vw, 80px); width: auto; }
        .divider-v { width: 2px; height: 50px; background: rgba(255,255,255,0.3); }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .page-brand { font-family: 'Montserrat', sans-serif; font-size: clamp(1.1rem, 3.5vw, 2rem); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: white; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-top: 8px solid var(--gold); position: relative; }
        
        .search-area { position: relative; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 18px 25px; border-radius: 50px; border: 2px solid #eee; outline: none; font-size: 16px; transition: 0.3s; }
        .btn-search { position: absolute; right: 8px; background: var(--forest); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .toggle-container { display: flex; gap: 10px; margin-bottom: 20px; }
        
        /* DROPDOWN ARROW FIX */
        select { 
            flex: 2; padding: 14px; border-radius: 12px; border: 2px solid #eee; background: #fafafa; font-weight: 700; outline: none; 
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23006633' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 15px;
        }

        .btn-all-exams { flex: 1.2; background: var(--forest); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 11px; text-transform: uppercase; padding: 10px; box-shadow: 0 4px 10px rgba(0,102,51,0.2); }

        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; display: none; }
        .student-meta h2 { color: var(--forest); margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase; }
        .photo-container { width: 120px; height: 120px; border-radius: 15px; border: 4px solid #eee; overflow: hidden; background: #f8f9fa; }
        .student-photo { width: 100%; height: 100%; object-fit: cover; }

        .results-container { display: none; }
        .subjects-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; border: 1px solid #f0f0f0; border-radius: 20px; padding: 15px; background: #fdfdfd; margin-top: 15px; }
        .subj-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; font-weight: 700; font-size: 14px; }
        .center-divider { width: 1px; background: #eee; height: 100%; }

        .cumulative-view { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 15px; overflow: hidden; display: none; font-size: 13px; border: 1px solid #eee; }
        .cumulative-view th { background: var(--forest); color: white; padding: 12px; text-align: center; }
        .cumulative-view td { padding: 12px; text-align: center; border: 1px solid #eee; font-weight: 700; }
        .subj-cell { text-align: left !important; background: #f9f9f9; color: #555; text-transform: uppercase; }
        .fail-mark { background: #ffebee !important; color: var(--danger) !important; font-weight: 900; }

        .graph-section { margin-top: 30px; border: 1px solid #f0f0f0; border-radius: 20px; padding: 20px; background: white; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-box { background: #f1f8f4; padding: 18px; border-radius: 15px; text-align: center; border: 1px solid #e2eee6; }
        .stat-box span { font-size: 24px; font-weight: 800; color: var(--forest); }
        .grade-box { grid-column: span 2; background: #fff8e1; border: 1px solid #ffe082; padding: 45px 20px; border-radius: 25px; text-align: center; margin-top: 15px; }
        .grade-box label { display: block; margin-bottom: 25px; font-size: 12px; font-weight: 900; color: #888; text-transform: uppercase; }
        .grade-pill { background: var(--forest); color: white; padding: 15px 80px; border-radius: 100px; font-size: 34px; font-weight: 900; display: inline-block; box-shadow: 0 10px 30px rgba(0,102,51,0.3); }

        .signatures-row { margin-top: 120px; display: none; justify-content: space-between; padding: 0 20px; }
        .sig-block { text-align: center; width: 185px; border-top: 3px solid #333; padding-top: 10px; font-size: 13px; font-weight: 800; text-transform: uppercase; }

        .btn-download { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 30px; width: 100%; display: none; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 650px) {
            .divider-v { display: none; }
            .subjects-section { grid-template-columns: 1fr; }
            .center-divider { display: none; }
            .cumulative-view { font-size: 9px; }
            .report-header { flex-direction: column-reverse; text-align: center; }
            .grade-pill { padding: 12px 50px; font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="portal-nav" id="noPrintNav">
    <a href="Student Portal.html"><i class="fas fa-id-card"></i> Profile</a>
    <a href="progress.html" class="active"><i class="fas fa-chart-line"></i> Progress</a>
    <a href="homework.html"><i class="fas fa-book-open"></i> Homework</a>
</div>

<div id="printableArea">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo">
            <div class="school-text">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>
            <div class="divider-v"></div>
            <div class="page-brand">ACADEMIC PROGRESS</div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div id="searchControls">
                <div class="search-area">
                    <input type="text" id="rollNo" placeholder="Enter Student Roll Number" onkeypress="if(event.key === 'Enter') fetchResults();">
                    <button class="btn-search" onclick="fetchResults()"><i class="fas fa-search"></i></button>
                </div>
                <div class="toggle-container">
                    <select id="examType" onchange="fetchResults()">
                        <option value="FA-1">FA-1</option><option value="FA-2">FA-2</option>
                        <option value="FA-3">FA-3</option><option value="SA-1">SA-1</option>
                        <option value="SA-2">SA-2</option>
                    </select>
                    <button id="toggleBtn" class="btn-all-exams" onclick="toggleCumulative()">All Exams View</button>
                </div>
            </div>

            <div id="reportProfile" class="report-header">
                <div class="student-meta">
                    <h2 id="dispName">-</h2>
                    <p id="dispClass">-</p>
                    <p id="dispRoll" style="color:var(--forest); font-weight:800;">-</p>
                </div>
                <div class="photo-container"><img id="studentPhoto" src="logo.png" class="student-photo" onerror="this.src='logo.png'"></div>
            </div>

            <div id="singleResults" class="results-container">
                <div class="subjects-section">
                    <div id="col1" class="subj-column"></div>
                    <div class="center-divider"></div>
                    <div id="col2" class="subj-column"></div>
                </div>
                <div class="graph-section"><canvas id="marksGraph"></canvas></div>
            </div>

            <table class="cumulative-view" id="allExamsTable">
                <thead><tr><th>Subject</th><th>FA1</th><th>FA2</th><th>FA3</th><th>SA1(Pre-Annual)</th><th>SA2(Annual)</th></tr></thead>
                <tbody id="allExamsBody"></tbody>
            </table>

            <div id="summaryArea" class="results-container">
                <div class="summary-grid">
                    <div class="stat-box"><label style="font-size:10px; font-weight:900;">TOTAL MARKS </label><span id="resTotal">-</span></div>
                    <div class="stat-box"><label style="font-size:10px; font-weight:900;">PERCENTAGE </label><span id="resPerc">-</span></div>
                    <div class="grade-box" id="promotionBox" style="display:none;">
                        <label>FINAL PROMOTION STATUS</label>
                        <span id="resGrade" class="grade-pill">-</span>
                    </div>
                </div>
                <div class="signatures-row" id="sigRow">
                    <div class="sig-block">Class Teacher Signature</div>
                    <div class="sig-block">Correspondent Signature <br><small>Mr. Shaik Ahmad</small></div>
                </div>
            </div>
            
            <button class="btn-download" id="pdfBtn" onclick="downloadReport()"><i class="fas fa-file-pdf"></i> Download Report Card</button>
            <div id="noData" style="text-align:center; padding: 40px; color: #999; display: none;">No Student Data Found.</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const students = {
        "1472070": { Name: "Hanish Macharla", Class: "Pre-KG" }, "1478225": { Name: "Arjun Vihaar Illandula", Class: "Pre-KG" }, "1469391": { Name: "Thanu sree Allakunta", Class: "Pre-KG" }, "1459555": { Name: "Aadhya Gangaraboina", Class: "Pre-KG" }, "1459560": { Name: "Aadhya Sri Oggula", Class: "Pre-KG" }, "1474500": { Name: "Aadhyasri Shivagoni", Class: "Pre-KG" }, "1460680": { Name: "Afraha Begum", Class: "Pre-KG" }, "1472299": { Name: "Aliya Sultana", Class: "Pre-KG" }, "1459683": { Name: "Anvika Bandi", Class: "Pre-KG" }, "1459620": { Name: "Aradana Devara konda", Class: "Pre-KG" }, "1459605": { Name: "Devansh Bandi", Class: "Pre-KG" }, "1472069": { Name: "Hanvitha Mulkalapelli", Class: "Pre-KG" }, "1472723": { Name: "Harsha Vardhan Seenapelli", Class: "Pre-KG" }, "1459658": { Name: "Hiranya Bandi", Class: "Pre-KG" }, "1478248": { Name: "Jashritha Boina", Class: "Pre-KG" }, "1481135": { Name: "Konreddy Shreyanvi", Class: "Pre-KG" }, "1459568": { Name: "Kriyansh Sammeta", Class: "Pre-KG" }, "1459555": { Name: "Hanish Macharla", Class: "Pre-KG" }, // ... [truncated for logic length, keep all 185 students in your file]
        "1298334": { Name: "Vyshnavi Uppala", Class: "Grade-8" }
    };

    let chartObj;
    let isCumulative = false;

    function getGradeSubjects(className) {
        if (["Grade-6", "Grade-7", "Grade-8"].includes(className)) return ["TEL", "HIN", "ENG", "MAT", "PHY", "CHE", "BIO", "SOC", "IIT"];
        if (className === "Grade-5") return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC", "IIT"];
        return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC"];
    }

    function toggleCumulative() {
        if(!isCumulative) fetchAllExams();
        else fetchResults();
    }

    function fetchResults() {
        isCumulative = false;
        document.getElementById('toggleBtn').innerText = "All Exams View";
        const roll = document.getElementById('rollNo').value.trim();
        const exam = document.getElementById('examType').value;
        const student = students[roll];

        document.getElementById('noData').style.display = 'none';
        document.getElementById('allExamsTable').style.display = 'none';
        document.getElementById('singleResults').style.display = 'none';
        document.getElementById('summaryArea').style.display = 'none';
        document.getElementById('reportProfile').style.display = 'none';
        document.getElementById('pdfBtn').style.display = 'none';
        if(chartObj) chartObj.destroy();

        if(!student) { if(roll) document.getElementById('noData').style.display = 'block'; return; }

        db.ref(`progress_cards/${student.Class}/${exam}/${student.Name}`).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('reportProfile').style.display = 'flex';
            document.getElementById('dispName').innerText = student.Name;
            document.getElementById('dispClass').innerText = student.Class;
            document.getElementById('dispRoll').innerText = `Roll Number: ${roll}`;
            document.getElementById('studentPhoto').src = `students/${roll}.png`;

            if(data) {
                document.getElementById('singleResults').style.display = 'block';
                document.getElementById('summaryArea').style.display = 'block';
                document.getElementById('pdfBtn').style.display = 'flex';
                document.getElementById('promotionBox').style.display = 'block';
                
                const subjects = getGradeSubjects(student.Class);
                const m = data.marks;
                document.getElementById('col1').innerHTML = ""; document.getElementById('col2').innerHTML = "";
                const half = Math.ceil(subjects.length / 2);
                subjects.forEach((sub, idx) => {
                    const row = `<div class="subj-item"><span>${sub}</span><span>${m[sub] || '-'}</span></div>`;
                    if(idx < half) document.getElementById('col1').innerHTML += row;
                    else document.getElementById('col2').innerHTML += row;
                });

                const ctx = document.getElementById('marksGraph').getContext('2d');
                chartObj = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: subjects, datasets: [{ data: subjects.map(s => m[s] || 0), backgroundColor: '#006633', borderRadius: 5 }] },
                    options: { scales: { y: { beginAtZero: true, max: 100 } } }
                });

                document.getElementById('resTotal').innerText = data.total;
                document.getElementById('resPerc').innerText = data.percentage + "%";
                document.getElementById('resGrade').innerText = data.grade;
            } else { document.getElementById('noData').style.display = 'block'; }
        });
    }

    async function fetchAllExams() {
        const roll = document.getElementById('rollNo').value.trim();
        const student = students[roll];
        if(!student) return alert("Enter Roll Number First");

        isCumulative = true;
        document.getElementById('toggleBtn').innerText = "Go Back to Single Exam";
        document.getElementById('singleResults').style.display = 'none';

        db.ref(`progress_cards/${student.Class}`).once('value', (snap) => {
            const classData = snap.val();
            const subjects = getGradeSubjects(student.Class);
            const exams = ["FA-1", "FA-2", "FA-3", "SA-1", "SA-2"];
            let tableHtml = ""; let grandTotal = 0; let totalPossible = 0;
            let sa2Exists = (classData && classData["SA-2"] && classData["SA-2"][student.Name]);

            subjects.forEach(sub => {
                let row = `<tr><td class="subj-cell">${sub}</td>`;
                exams.forEach(ex => {
                    let mark = (classData && classData[ex] && classData[ex][student.Name]) ? classData[ex][student.Name].marks[sub] : '-';
                    const failClass = (mark !== '-' && parseInt(mark) < 35) ? 'fail-mark' : '';
                    row += `<td class="${failClass}">${mark}</td>`;
                    if(mark !== '-') { grandTotal += parseInt(mark); totalPossible += 100; }
                });
                tableHtml += row + `</tr>`;
            });

            document.getElementById('allExamsBody').innerHTML = tableHtml;
            document.getElementById('allExamsTable').style.display = 'table';
            document.getElementById('summaryArea').style.display = 'block';
            document.getElementById('pdfBtn').style.display = 'flex';
            
            const perc = totalPossible > 0 ? ((grandTotal / totalPossible) * 100).toFixed(1) : '0';
            document.getElementById('resTotal').innerText = grandTotal;
            document.getElementById('resPerc').innerText = perc + "%";
            document.getElementById('promotionBox').style.display = sa2Exists ? 'block' : 'none';
            document.getElementById('resGrade').innerText = perc >= 35 ? "PROMOTED" : "RETAINED";
        });
    }

    async function downloadReport() {
        const nav = document.getElementById('noPrintNav');
        const sc = document.getElementById('searchControls');
        const btn = document.getElementById('pdfBtn');
        const sig = document.getElementById('sigRow');
        
        nav.style.display = 'none'; sc.style.display = 'none'; btn.style.display = 'none'; sig.style.display = 'flex';

        const canvas = await html2canvas(document.getElementById('printableArea'), { scale: 2 });
        const img = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(img, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`${document.getElementById('dispName').innerText}_Report.pdf`);

        nav.style.display = 'flex'; sc.style.display = 'block'; btn.style.display = 'flex'; sig.style.display = 'none';
    }
</script>
</body>
</html>
