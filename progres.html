<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Progress | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; --danger: #e53935; --premium-gradient: linear-gradient(135deg, #006633 0%, #004d26 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f1; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        .portal-nav { background: #004d26; padding: 12px; display: flex; justify-content: center; gap: 5px; position: sticky; top: 0; z-index: 2000; overflow-x: auto; }
        .portal-nav a { color: white; text-decoration: none; font-weight: bold; font-size: 11px; padding: 8px 12px; border-radius: 25px; white-space: nowrap; }
        .portal-nav a.active { background: rgba(255,255,255,0.2); border: 1px solid var(--gold); color: var(--gold); }

        header { background: var(--forest); color: white; padding: 20px 15px; border-bottom: 4px solid var(--gold); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 15px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .header-logo { height: 60px; width: auto; }
        .divider-v { width: 2px; height: 40px; background: rgba(255,255,255,0.3); display: block; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); position: relative; }
        
        .search-area { position: relative; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 16px 20px; border-radius: 50px; border: 2px solid #eee; outline: none; font-size: 14px; }
        .btn-search { position: absolute; right: 8px; background: var(--forest); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .toggle-container { display: flex; gap: 10px; margin-bottom: 20px; flex-direction: row; }
        select { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid #eee; background: #fff; font-weight: 700; outline: none; -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23006633' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; background-size: 14px; font-size: 13px; }

        .btn-premium { flex: 1; background: var(--premium-gradient); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 10px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 12px; transition: 0.3s; }
        .btn-premium.back-mode { background: #fff; color: var(--forest); border: 2px solid var(--forest); }

        .report-header { display: none; flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fcfdfc; padding: 15px; border-radius: 20px; border: 1px solid #edf2ef; }
        .student-meta h2 { color: var(--forest); margin: 0; font-size: 1.2rem; font-weight: 900; }
        .photo-container { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .student-photo { width: 100%; height: 100%; object-fit: cover; }

        .results-container { display: none; }
        .subjects-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid #eee; border-radius: 20px; padding: 15px; background: white; }
        .subj-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f9f9f9; font-weight: 700; font-size: 13px; }
        .center-divider { width: 1px; background: #f0f0f0; height: 100%; }

        .cumulative-view { width: 100%; border-collapse: collapse; margin-top: 15px; border-radius: 15px; overflow: hidden; display: none; font-size: 11px; }
        .cumulative-view th { background: var(--forest); color: white; padding: 10px 5px; }
        .cumulative-view td { padding: 10px 5px; text-align: center; border: 1px solid #eee; font-weight: 700; }
        .fail-mark { background: #fff5f5 !important; color: var(--danger) !important; }

        .graph-section { margin-top: 20px; border: 1px solid #eee; border-radius: 20px; padding: 15px; background: white; height: 250px; }

        .summary-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-ring-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #f0f0f0; }
        .stat-label { display: block; font-size: 9px; font-weight: 900; color: #aaa; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: 900; color: var(--forest); }

        .grade-highlight-box { grid-column: span 2; background: var(--premium-gradient); color: white; padding: 25px; border-radius: 20px; text-align: center; }
        .big-grade { font-size: 40px; font-weight: 900; display: block; color: var(--gold); }

        .signatures-row { margin-top: 100px; display: none; justify-content: space-between; padding: 0 10px; }
        .sig-block { text-align: center; width: 45%; border-top: 2px solid #333; padding-top: 8px; font-size: 10px; font-weight: 800; }
        .correspondent-sub { display: block; margin-top: 2px; color: var(--forest); font-size: 11px; font-weight: 900; }

        .btn-download { background: var(--forest); color: white; border: none; padding: 16px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 25px; width: 100%; display: none; justify-content: center; align-items: center; gap: 8px; font-size: 14px; }

        /* MOBILE SPECIFIC OVERRIDES */
        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 8px; }
            .divider-v { display: none; }
            .subjects-section { grid-template-columns: 1fr; }
            .center-divider { display: none; }
            .toggle-container { flex-direction: column; }
            .report-header { flex-direction: column-reverse; text-align: center; gap: 10px; }
            .cumulative-view { display: block; overflow-x: auto; white-space: nowrap; }
            .cumulative-view th, .cumulative-view td { font-size: 10px; padding: 8px 4px; }
        }
    </style>
</head>

<div class="portal-nav" id="noPrintNav">
    <a href="Student Portal.html"><i class="fas fa-id-card"></i> Profile</a>
    <a href="progress.html" class="active"><i class="fas fa-chart-line"></i> Progress</a>
    <a href="homework.html"><i class="fas fa-book-open"></i> Homework</a>
</div>

<div id="printableArea">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo">
            <div class="school-text">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>
            <div class="divider-v"></div>
            <div class="page-brand" style="font-family:Montserrat; font-weight:800; font-size:1.2rem;">ACADEMIC PROGRESS</div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div id="searchControls">
                <div class="search-area">
                    <input type="text" id="rollNo" placeholder="Roll Number" onkeypress="if(event.key === 'Enter') fetchResults();">
                    <button class="btn-search" onclick="fetchResults()"><i class="fas fa-search"></i></button>
                </div>
                <div class="toggle-container">
                    <select id="examType" onchange="fetchResults()">
                        <option value="FA-1">FA-1</option><option value="FA-2">FA-2</option>
                        <option value="FA-3">FA-3</option><option value="SA-1">SA-1(Pre-Annual)</option>
                        <option value="SA-2">SA-2(Annual)</option>
                    </select>
                    <button id="toggleBtn" class="btn-premium" onclick="toggleCumulative()">
                        <i class="fas fa-th-list"></i> All Exams View
                    </button>
                </div>
            </div>

            <div id="reportProfile" class="report-header">
                <div class="student-meta">
                    <h2 id="dispName">-</h2>
                    <p id="dispClass" style="font-weight:700; color:#777; margin: 3px 0; font-size: 14px;">-</p>
                    <p id="dispRoll" style="color:var(--forest); font-weight:800; font-size:11px;">-</p>
                </div>
                <div class="photo-container"><img id="studentPhoto" src="logo.png" class="student-photo" onerror="this.src='logo.png'"></div>
            </div>

            <div id="singleResults" class="results-container">
                <div class="subjects-section">
                    <div id="col1"></div>
                    <div class="center-divider"></div>
                    <div id="col2"></div>
                </div>
                <div class="graph-section"><canvas id="marksGraph"></canvas></div>
            </div>

            <div style="overflow-x:auto;">
                <table class="cumulative-view" id="allExamsTable">
                    <thead><tr><th>Subject</th><th>FA1</th><th>FA2</th><th>FA3</th><th>SA1(Pre-Annual)</th><th>SA2(Annual)</th></tr></thead>
                    <tbody id="allExamsBody"></tbody>
                </table>
            </div>

            <div id="summaryArea" class="results-container">
                <div class="summary-dashboard">
                    <div class="stat-ring-card"><span class="stat-label">TOTAL MARKS</span><span id="resTotal" class="stat-value">-</span></div>
                    <div class="stat-ring-card"><span class="stat-label">PERCENTAGE</span><span id="resPerc" class="stat-value">-</span></div>
                    <div class="grade-highlight-box" id="promotionBox" style="display:none;">
                        <label id="gradeLabel" style="color:rgba(255,255,255,0.7); font-size:10px; font-weight:900;">GRADE</label>
                        <span id="resGrade" class="big-grade">-</span>
                    </div>
                </div>
                <div class="signatures-row" id="sigRow">
                    <div class="sig-block">Teacher Sign</div>
                    <div class="sig-block">
                        Correspondent Sign<br>
                        <span class="correspondent-sub">Mr. Shaik Ahmad</span>
                    </div>
                </div>
            </div>
            
            <button class="btn-download" id="pdfBtn" onclick="downloadReport()"><i class="fas fa-file-pdf"></i> Download Report</button>
            <div id="noData" style="text-align:center; padding: 40px; color: #999; display: none; font-size: 13px;">No Student Found.</div>
        </div>
    </div>
</div>

    let chartObj;
    let isCumulative = false;

    function getGradeSubjects(className) {
        if (["Grade-6", "Grade-7", "Grade-8"].includes(className)) return ["TEL", "HIN", "ENG", "MAT", "PHY", "CHE", "BIO", "SOC", "IIT"];
        if (className === "Grade-5") return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC", "IIT"];
        return ["TEL", "HIN", "ENG", "MAT", "SCI", "SOC"];
    }

    function toggleCumulative() {
        if(!isCumulative) fetchAllExams();
        else fetchResults();
    }

    function fetchResults() {
        isCumulative = false;
        const toggleBtn = document.getElementById('toggleBtn');
        if(toggleBtn) {
            toggleBtn.innerHTML = '<i class="fas fa-th-list"></i> All Exams View';
            toggleBtn.classList.remove('back-mode');
        }

        const roll = document.getElementById('rollNo').value.trim();
        const exam = document.getElementById('examType').value;
        const student = students[roll];

        if(!student) { if(roll) document.getElementById('noData').style.display = 'block'; return; }

        db.ref(`progress_cards/${student.Class}/${exam}/${student.Name}`).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('reportProfile').style.display = 'flex';
            document.getElementById('dispName').innerText = student.Name;
            document.getElementById('dispClass').innerText = student.Class;
            document.getElementById('dispRoll').innerText = `Roll Number: ${roll}`;
            document.getElementById('studentPhoto').src = `students/${roll}.png`;

            if(data) {
                document.getElementById('singleResults').style.display = 'block';
                document.getElementById('summaryArea').style.display = 'block';
                document.getElementById('allExamsTable').style.display = 'none';
                document.getElementById('pdfBtn').style.display = 'flex';
                document.getElementById('promotionBox').style.display = 'block';

                const subjects = getGradeSubjects(student.Class);
                const m = data.marks || {};
                document.getElementById('col1').innerHTML = ""; document.getElementById('col2').innerHTML = "";
                const half = Math.ceil(subjects.length / 2);
                
                subjects.forEach((sub, idx) => {
                    const mark = m[sub] !== undefined ? m[sub] : '-';
                    const row = `<div class="subj-item"><span>${sub}</span><span>${mark}</span></div>`;
                    if(idx < half) document.getElementById('col1').innerHTML += row;
                    else document.getElementById('col2').innerHTML += row;
                });

                if(chartObj) chartObj.destroy();
                const ctx = document.getElementById('marksGraph').getContext('2d');
                chartObj = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: subjects, datasets: [{ data: subjects.map(s => m[s] || 0), backgroundColor: '#006633', borderRadius: 5 }] },
                    options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
                });

                document.getElementById('resTotal').innerText = data.total;
                document.getElementById('resPerc').innerText = data.percentage.toString().replace('%','') + "%";
                document.getElementById('resGrade').innerText = data.grade;
                document.getElementById('noData').style.display = 'none';
            } else { 
                document.getElementById('singleResults').style.display = 'none';
                document.getElementById('summaryArea').style.display = 'none';
                document.getElementById('noData').style.display = 'block'; 
            }
        });
    }

    async function fetchAllExams() {
        const roll = document.getElementById('rollNo').value.trim();
        const student = students[roll];
        if(!student) return;

        isCumulative = true;
        const toggleBtn = document.getElementById('toggleBtn');
        toggleBtn.innerHTML = '<i class="fas fa-undo"></i> Back to Single Exam';
        toggleBtn.classList.add('back-mode');
        document.getElementById('singleResults').style.display = 'none';

        db.ref(`progress_cards/${student.Class}`).once('value', (snap) => {
            const classData = snap.val();
            const subjects = getGradeSubjects(student.Class);
            const exams = ["FA-1", "FA-2", "FA-3", "SA-1", "SA-2"];
            let tableHtml = ""; let grandTotal = 0; let totalPossible = 0;
            let sa2Exists = (classData && classData["SA-2"] && classData["SA-2"][student.Name]);

            subjects.forEach(sub => {
                let row = `<tr><td class="subj-cell">${sub}</td>`;
                exams.forEach(ex => {
                    let mark = (classData && classData[ex] && classData[ex][student.Name]) ? classData[ex][student.Name].marks[sub] : '-';
                    if (mark === undefined || mark === 'undefined') mark = '-';
                    row += `<td class="${mark !== '-' && parseInt(mark) < 35 ? 'fail-mark' : ''}">${mark}</td>`;
                    if(mark !== '-') { grandTotal += parseInt(mark); totalPossible += 100; }
                });
                tableHtml += row + `</tr>`;
            });

            document.getElementById('allExamsBody').innerHTML = tableHtml;
            document.getElementById('allExamsTable').style.display = 'table';
            document.getElementById('summaryArea').style.display = 'block';
            document.getElementById('pdfBtn').style.display = 'flex';
            
            const perc = totalPossible > 0 ? ((grandTotal / totalPossible) * 100).toFixed(1) : '0';
            document.getElementById('resTotal').innerText = grandTotal;
            document.getElementById('resPerc').innerText = perc + "%";
            document.getElementById('promotionBox').style.display = sa2Exists ? 'block' : 'none';
            document.getElementById('resGrade').innerText = perc >= 35 ? "PROMOTED" : "RETAINED";
        });
    }

    async function downloadReport() {
        const nav = document.getElementById('noPrintNav');
        const sc = document.getElementById('searchControls');
        const sig = document.getElementById('sigRow');
        nav.style.display = 'none'; sc.style.display = 'none'; sig.style.display = 'flex';
        const canvas = await html2canvas(document.getElementById('printableArea'), { scale: 2 });
        const img = canvas.toDataURL('image/png');
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        pdf.addImage(img, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`${document.getElementById('dispName').innerText}_Report.pdf`);
        nav.style.display = 'flex'; sc.style.display = 'block'; sig.style.display = 'none';
    }
