<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Progress | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; }
        
        /* NAVIGATION */
        .portal-nav { background: #004d26; padding: 12px; display: flex; justify-content: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 2000; }
        .portal-nav a { color: white; text-decoration: none; font-weight: bold; font-size: 12px; padding: 8px 15px; border-radius: 25px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .portal-nav a.active { background: rgba(255,255,255,0.2); border: 1px solid var(--gold); color: var(--gold); }

        /* HEADER */
        header { background: var(--forest); color: white; padding: 25px 3%; }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .header-logo { height: clamp(55px, 8vw, 80px); width: auto; }
        .divider-v { width: 2px; height: 50px; background: rgba(255,255,255,0.3); }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 4vw, 2.2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .page-brand { font-family: 'Montserrat', sans-serif; font-size: clamp(1.1rem, 3.5vw, 2rem); font-weight: 800; text-transform: uppercase; color: white; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-top: 8px solid var(--gold); }
        
        .search-area { position: relative; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 18px 25px; border-radius: 50px; border: 2px solid #eee; outline: none; font-size: 16px; }
        .btn-search { position: absolute; right: 8px; background: var(--forest); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee; background: #fafafa; font-weight: 700; color: #444; margin-bottom: 20px; }

        /* STUDENT PROFILE & IMAGE */
        .student-profile { text-align: center; margin-bottom: 25px; display: none; }
        .photo-container { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.15); margin: 0 auto 15px; overflow: hidden; background: #eee; }
        .student-photo { width: 100%; height: 100%; object-fit: cover; }
        .student-profile h2 { margin: 0; color: var(--forest); text-transform: uppercase; font-size: 22px; font-weight: 900; }
        .student-profile p { color: #666; font-weight: 700; margin: 5px 0; }

        /* TWO-COLUMN RESULTS */
        .results-container { display: none; }
        .subjects-section { 
            display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; 
            border: 1px solid #f0f0f0; border-radius: 15px; padding: 15px; background: #fdfdfd; margin-top: 15px;
        }
        .subj-column { display: flex; flex-direction: column; }
        .subj-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; font-weight: 700; }
        .subj-item:last-child { border-bottom: none; }
        .center-divider { width: 1px; background: #eee; }

        /* GRAPH & SUMMARY */
        .graph-section { margin-top: 25px; border: 1px solid #f0f0f0; border-radius: 15px; padding: 15px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: #f1f8f4; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #e2eee6; }
        .stat-box label { display: block; font-size: 10px; color: #777; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .stat-box span { font-size: 20px; font-weight: 800; color: var(--forest); }
        
        .grade-box { grid-column: span 2; background: #fff8e1; border: 1px solid #ffe082; padding: 25px; border-radius: 15px; text-align: center; margin-top: 10px; }
        .grade-pill { background: var(--forest); color: white; padding: 12px 50px; border-radius: 50px; font-size: 26px; font-weight: 900; display: inline-block; box-shadow: 0 5px 15px rgba(0,102,51,0.25); }

        .audit-trail { margin-top: 30px; padding: 15px; border-top: 1px dashed #ccc; color: #999; font-size: 11px; text-align: center; line-height: 1.6; }

        @media (max-width: 650px) {
            .divider-v { display: none; }
            .header-content { flex-direction: column; gap: 8px; text-align: center; }
            .school-text { text-align: center; }
            .subjects-section { grid-template-columns: 1fr; }
            .center-divider { display: none; }
        }
    </style>
</head>

    let chartInstance;

    function fetchResults() {
        const roll = document.getElementById('rollNo').value.trim();
        const exam = document.getElementById('examType').value;
        const student = students[roll];

        document.getElementById('resultsContainer').style.display = 'none';
        document.getElementById('studentProfile').style.display = 'none';
        if(chartInstance) chartInstance.destroy();

        if(!student) { document.getElementById('noData').style.display = 'block'; return; }

            const data = snap.val();
            
            document.getElementById('studentProfile').style.display = 'block';
            document.getElementById('dispName').innerText = student.Name;
            document.getElementById('dispClass').innerText = student.Class;

                document.getElementById('resultsContainer').style.display = 'block';

                const order = ["TEL", "HIN", "ENG", "MAT", "SCI", "PHY", "CHE", "BIO", "SOC", "IIT"];
                const available = order.filter(s => marks[s] !== undefined);
                
                document.getElementById('col1').innerHTML = "";
                document.getElementById('col2').innerHTML = "";
                
                const half = Math.ceil(available.length / 2);
                available.forEach((sub, idx) => {
                    const html = `<div class="subj-item"><span class="subj-name">${sub}</span><span class="subj-mark">${marks[sub]}</span></div>`;
                    if(idx < half) document.getElementById('col1').innerHTML += html;
                    else document.getElementById('col2').innerHTML += html;
                });

                // CHART
                const ctx = document.getElementById('marksGraph').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: available,
                        datasets: [{ data: available.map(s => marks[s]), backgroundColor: 'rgba(0,102,51,0.8)', borderRadius: 5 }]
                    },
                    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { max: 100, beginAtZero: true } } }
                });

                document.getElementById('resTotal').innerText = data.total;
                document.getElementById('resPerc').innerText = data.percentage;
                document.getElementById('resGrade').innerText = data.grade;
                document.getElementById('logTeacher').innerText = data.updatedBy || 'Staff';
                document.getElementById('logTime').innerText = data.updatedAt || 'N/A';
            } else {
                document.getElementById('noData').style.display = 'block';
            }
        });
    }
</script>
</body>
</html>
