<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | Student Accessories Store</title>
    <!-- Google Fonts & Bootstrap Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #002347; /* Deep Premium Navy */
            --accent: #C5A059;  /* Institutional Gold */
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f9;
            color: var(--primary);
        }

        /* Premium Navbar */
        .navbar {
            background: var(--primary);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--accent);
            padding: 1rem 0;
        }

        .navbar-brand { font-weight: 700; letter-spacing: 1px; color: white !important; }

        /* Product Cards */
        .product-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .img-container {
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
        }

        .product-img {
            height: 140px;
            object-fit: contain;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* Cart Sidebar Styles */
        .cart-badge {
            background: var(--accent);
            color: var(--primary);
            font-weight: bold;
        }

        .premium-input {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .premium-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.25 darkred;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill me-2"></i>STUDENT ACCESSORY STORE</a>
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-light position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
                <i class="bi bi-bag-check-fill"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill cart-badge">0</span>
            </button>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row mb-5">
        <div class="col-12 text-center">
            <h1 class="fw-bold">Student Essentials</h1>
            <p class="text-muted">High-quality accessories for your academic journey.</p>
        </div>
    </div>

    <div class="row g-4" id="shop-grid">
        <!-- JS will inject products here -->
    </div>
</div>

<!-- Cart Sidebar (Offcanvas for "Amazon" feel) -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar" style="width: 400px;">
    <div class="offcanvas-header bg-light border-bottom">
        <h5 class="offcanvas-title fw-bold text-primary">Your Shopping Cart</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div id="cart-items" class="mb-4">
            <!-- Items go here -->
        </div>
        
        <div id="checkout-section" style="display:none;">
            <hr>
            <h6 class="fw-bold mb-3"> Order Details</h6>
            <form id="orderForm">
                <input type="text" id="name" class="form-control premium-input" placeholder="Student Full Name" required>
                <input type="email" id="email" class="form-control premium-input" placeholder="Parent Email Address" required>
                <input type="tel" id="phone" class="form-control premium-input" placeholder="Phone Number" required>
                <input type="text" id="pincode" class="form-control premium-input" placeholder="Pincode" required>
                
                <div class="d-flex justify-content-between fw-bold fs-5 my-3">
                    <span>Total Amount:</span>
                    <span id="cart-total">₹0</span>
                </div>
                
                <button type="submit" class="btn btn-add w-100 py-3">CONFIRM ORDER</button>
            </form>
        </div>
        <div id="empty-msg" class="text-center py-5 text-muted">
            <i class="bi bi-cart-x fs-1"></i>
            <p>Your cart is empty.</p>
        </div>
    </div>
</div>

<script type="module">
    // --- FIREBASE CONFIGURATION ---
    // (Replace with your actual Firebase project config)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
  authDomain: "paramount-school-d55bc.firebaseapp.com",
  databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
  projectId: "paramount-school-d55bc",
  storageBucket: "paramount-school-d55bc.firebasestorage.app",
  messagingSenderId: "130979432562",
  appId: "1:130979432562:web:4cd94787b23f9daba51aeb",
  measurementId: "G-ZMZHXB5GFM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- PRODUCT DATA ---
    const products = [
         { id: 'p1', name: 'Premium School Tie', price: 180, category: 'Uniform', image: 'https://img.icons8.com/color/144/necktie.png' },
    { id: 'p2', name: 'Nylon Socks (Pair)', price: 90, category: 'Uniform', image: 'https://img.icons8.com/color/144/socks.png' },
    { id: 'p3', name: 'Leather Belt', price: 220, category: 'Uniform', image: 'https://img.icons8.com/color/144/belt.png' },
    { id: 'p4', name: 'School ID Card Case', price: 45, category: 'Accessories', image: 'https://img.icons8.com/color/144/id-badge.png' },
    { id: 'p5', name: 'Acrylic Exam Pad', price: 120, category: 'Stationery', image: 'https://img.icons8.com/color/144/clipboard.png' },
    { id: 'p6', name: 'Graphite Pencil Set', price: 60, category: 'Stationery', image: 'https://img.icons8.com/color/144/pencil--v1.png' },
    { id: 'p7', name: 'Eraser & Sharpener Kit', price: 30, category: 'Stationery', image: 'https://img.icons8.com/color/144/eraser.png' },
    { id: 'p8', name: 'Premium Storage Box', price: 250, category: 'Stationery', image: 'https://img.icons8.com/color/144/box--v1.png' },
    { id: 'p9', name: 'Sketch Pens (12 Colors)', price: 95, category: 'Art', image: 'https://img.icons8.com/color/144/marker-pen.png' },
    { id: 'p10', name: 'Wax Crayons Set', price: 75, category: 'Art', image: 'https://img.icons8.com/color/144/crayons.png' }
    ];

    let cart = [];

   // --- RENDER PRODUCTS ---
const shopGrid = document.getElementById('shop-grid');
shopGrid.innerHTML = products.map(item => `
    <div class="col-6 col-md-4 col-lg-3">
        <div class="card product-card h-100">
            <div class="img-container d-flex align-items-center justify-content-center" style="height: 180px;">
                <img src="${item.image}" alt="${item.name}" class="product-img img-fluid" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
            </div>
            <div class="card-body">
                <small class="text-uppercase text-muted fw-bold" style="font-size: 10px;">${item.category}</small>
                <h6 class="card-title fw-bold mb-1">${item.name}</h6>
                <p class="text-primary fw-bold mb-3">₹${item.price}</p>
                <button class="btn btn-add btn-sm w-100" onclick="addToCart('${item.id}')">
                    <i class="bi bi-plus-lg me-1"></i> Add to Cart
                </button>
            </div>
        </div>
    </div>
`).join('');

    // --- CART FUNCTIONS ---
    window.addToCart = (productId) => {
        const item = products.find(p => p.id === productId);
        cart.push(item);
        renderCart();
        // Visual feedback
        const count = document.getElementById('cart-count');
        count.classList.add('animate__animated', 'animate__bounce');
        setTimeout(() => count.classList.remove('animate__bounce'), 1000);
    };

    window.removeFromCart = (index) => {
        cart.splice(index, 1);
        renderCart();
    };

    function renderCart() {
        const cartItems = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        const checkoutSec = document.getElementById('checkout-section');
        const emptyMsg = document.getElementById('empty-msg');

        cartCount.innerText = cart.length;
        
        if(cart.length === 0) {
            cartItems.innerHTML = '';
            checkoutSec.style.display = 'none';
            emptyMsg.style.display = 'block';
            return;
        }

        emptyMsg.style.display = 'none';
        checkoutSec.style.display = 'block';

        let total = 0;
        cartItems.innerHTML = cart.map((item, index) => {
            total += item.price;
            return `
                <div class="d-flex align-items-center justify-content-between mb-3 p-2 bg-light rounded">
                    <div>
                        <span class="d-block fw-bold">${item.name}</span>
                        <small class="text-muted">₹${item.price}</small>
                    </div>
                    <button class="btn btn-sm text-danger" onclick="removeFromCart(${index})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            `;
        }).join('');
        cartTotal.innerText = `₹${total}`;
    }

    // --- ORDER SUBMISSION ---
    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const orderId = "PRM-" + Date.now().toString().slice(-6);
        const total = cart.reduce((acc, curr) => acc + curr.price, 0);

        const orderDetails = {
            order_id: orderId,
            customer_name: document.getElementById('name').value,
            customer_email: document.getElementById('email').value,
            customer_phone: document.getElementById('phone').value,
            pincode: document.getElementById('pincode').value,
            items: cart,
            grand_total: total,
            order_status: "Pending",
            created_at: serverTimestamp()
        };

        try {
            await addDoc(collection(db, "orders"), orderDetails);
            alert(`Order Successful! \nYour Order ID: ${orderId} \nOur team will contact you soon.`);
            cart = [];
            renderCart();
            document.getElementById('orderForm').reset();
            // Close sidebar
            var offcanvasElement = document.getElementById('cartSidebar');
            var offcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
            offcanvas.hide();
        } catch (error) {
            console.error("Order Error: ", error);
            alert("Something went wrong. Please try again.");
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
