<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Hall Ticket | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .download-card { background: white; padding: 40px 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 8px solid var(--forest); }
        .logo { height: 80px; margin-bottom: 20px; }
        h2 { color: var(--forest); font-family: 'Montserrat'; font-weight: 800; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 16px; font-weight: 700; outline: none; margin-bottom: 20px; text-align: center; }
        .btn-download { background: var(--forest); color: white; border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-download:hover { transform: scale(1.03); background: #004d26; }
    </style>
</head>
<body>

<div class="download-card">
    <img src="logo.png" class="logo">
    <h2>HALL TICKET</h2>
    <p>Enter your Roll Number to download</p>
    <input type="text" id="studentRoll" placeholder="e.g. 1472070">
    <button class="btn-download" onclick="checkAndDownload()">Download PDF <i class="fas fa-file-pdf"></i></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Map your student data here (same as other pages)
    const studentData = { "1472070": { Name: "Hanish Macharla", Class: "Pre-KG" } /* ... add other students ... */ };

    async function checkAndDownload() {
        const roll = document.getElementById('studentRoll').value.trim();
        const student = studentData[roll];

        if(!student) return Swal.fire('Error', 'Invalid Roll Number', 'error');

        Swal.fire({ title: 'Checking Server...', didOpen: () => Swal.showLoading() });

        // Check if tickets for this class are published
        const snap = await db.ref(`portal_settings/halltickets_live/${student.Class}`).once('value');
        const settings = snap.val();

        if(!settings || settings.status !== "Live") {
            return Swal.fire('Not Ready', 'Hall tickets for your class have not been released yet.', 'info');
        }

        // If ready, fetch specific data and trigger print function
        // (Insert your printTickets logic here to generate the PDF for just THIS student)
        Swal.fire('Ready!', 'Generating your Hall Ticket...', 'success');
        
        // Code to show/print the ticket for this specific student roll...
    }
</script>
</body>
</html>
