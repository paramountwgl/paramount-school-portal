<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f4f4; }
        
        .profile-header { 
            background: #228B22; 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            position: relative; 
        }

        .profile-card { 
            max-width: 800px; 
            margin: 80px auto 40px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            position: relative;
        }

        .student-photo { 
            width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; 
            margin-top: -90px; background: #eee; object-fit: cover;
        }

        .info-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-top: 30px; text-align: left; 
        }

        .info-item { padding: 10px; border-bottom: 1px solid #eee; }
        .info-item label { font-size: 12px; color: #888; display: block; text-transform: uppercase; }
        .info-item span { font-weight: bold; color: #333; }
        
        .status-badge { 
            padding: 5px 15px; border-radius: 20px; font-size: 12px; 
            background: #e8f5e9; color: #2e7d32; font-weight: bold; 
            transition: 0.3s;
        }

        #attendanceAlert {
            display: none; 
            background-color: #fff3f3; 
            color: #c62828; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid #c62828; 
            margin: 20px 0; 
            text-align: left; 
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="profile-header">
    <a href="index.html" style="position: absolute; top: 15px; left: 20px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; cursor: pointer;">
        <img src="logo.png" alt="Logo" style="height: 55px; width: auto; filter: brightness(0) invert(1);">
        <div style="text-align: left;">
            <h1 style="margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;">Paramount</h1>
            <p style="margin: 0; font-size: 9px; font-weight: bold; opacity: 0.9;">ENGLISH MEDIUM SCHOOL</p>
        </div>
    </a>

    <div style="display: flex; justify-content: center; gap: 10px; margin-top: 10px;">
        <input type="text" id="rollNumberInput" placeholder="Enter Roll Number" 
               style="padding: 12px 20px; border-radius: 30px; border: none; width: 100%; max-width: 350px; font-size: 16px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <button onclick="searchStudent()" 
                style="padding: 12px 25px; border-radius: 30px; border: none; background-color: #ffcc00; color: #228B22; font-weight: bold; cursor: pointer;">
            <i class="fas fa-search"></i>
        </button>
    </div>
</div>

<h1 style="text-align: center; color: #228B22; margin-top: 30px; text-transform: uppercase; letter-spacing: 2px;">
    Student Portal
</h1>

<div class="profile-card">
    <div style="text-align: center;">
        <img src="Shaik Tauseef Ali.png.jpeg" alt="Student Photo" class="student-photo">
        <h2 id="studentName" style="margin: 10px 0 5px;">Student Name</h2>
        <span class="status-badge" id="statusBadge">Search to View Status</span>
    </div>

    <div id="attendanceAlert">
        <i class="fas fa-exclamation-triangle"></i> 
        <strong>Low Attendance Warning:</strong> Parent/Guardian intervention is required for this student.
    </div>

    <div class="info-grid">
        <div class="info-item">
            <label>Class / Section</label>
            <span id="studentClass">---</span>
        </div>
        <div class="info-item">
            <label>Father's Name</label>
            <span id="fatherName">---</span>
        </div>
        <div class="info-item">
            <label>Attendance</label>
            <span id="attendanceRate">---</span>
        </div>
        <div class="info-item">
            <label>Roll Number</label>
            <span id="RollNumber">---</span>
        </div>
        <div class="info-item">
            <label>Parent Phone Number</label>
            <span id="PhoneNumber">---</span>
        </div>
    </div>
    
    <div style="margin-top: 30px; text-align: center;">
        <a href="index.html" style="text-decoration: none; color: #228B22; font-weight: bold;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</div>

<script>
const studentData = {
    "2203A51618": {
        name: "Shaik Tauseef Ali",
        class: "10th Grade - A",
        father: "Mr. Shaik Ahmad",
        attendance: "95%",
        roll: "2203A51618",
        phonenumber: "9550791538"
    },
    "2203A51611": {
        name: "Ayaan Khan",
        class: "9th Grade - B",
        father: "Mr. Mohammad Khan",
        attendance: "42%", 
        roll: "2203A51611",
        phonenumber: "8341039583"
    }
};

function searchStudent() {
    const input = document.getElementById('rollNumberInput').value.trim();
    const student = studentData[input];
    const alertBox = document.getElementById('attendanceAlert');

    if (student) {
        document.getElementById('studentName').innerText = student.name;
        document.getElementById('studentClass').innerText = student.class;
        document.getElementById('fatherName').innerText = student.father;
        document.getElementById('attendanceRate').innerText = student.attendance;
        document.getElementById('RollNumber').innerText = student.roll;
        document.getElementById('PhoneNumber').innerText = student.phonenumber;

        const attendanceValue = parseInt(student.attendance);
        const statusBadge = document.getElementById('statusBadge');

        if (attendanceValue < 50) {
            statusBadge.innerText = "Inactive Student";
            statusBadge.style.background = "#ffebee";
            statusBadge.style.color = "#c62828";
            alertBox.style.display = "block";
        } else {
            statusBadge.innerText = "Active Student";
            statusBadge.style.background = "#e8f5e9";
            statusBadge.style.color = "#2e7d32";
            alertBox.style.display = "none";
        }
    } else {
        alert("Roll Number not found. Please try again.");
    }
}
</script>
</body>
</html>
