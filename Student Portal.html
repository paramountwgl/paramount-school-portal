<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Profile | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f4f4; overflow-x: hidden; width: 100%; }
        
        .profile-header { 
            background: #228B22; 
            color: white; 
            padding: 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 200px;
            position: relative;
        }

        .header-logo-box {
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-decoration: none; 
            color: white; 
            cursor: pointer;
            padding: 10px;
            z-index: 10;
        }

        /* FIXED LOGO SIZING */
        .header-logo-box img {
            height: 85px; /* Increased size */
            width: auto;
            display: block;
        }

        .header-logo-box h1 {
            margin: 0;
            font-size: 32px; /* Large professional font */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            color: white;
        }

        .header-logo-box p {
            margin: 0;
            font-size: 12px;
            font-weight: bold;
            opacity: 0.9;
            letter-spacing: 1px;
            color: white;
        }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .input-wrapper {
            position: relative; 
            flex: 1;
            display: flex;
            align-items: center;
        }

        #rollNumberInput {
            padding: 12px 45px 12px 20px;
            border-radius: 30px;
            border: none;
            width: 100%;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #clearBtn {
            position: absolute;
            right: 15px;
            color: #888;
            cursor: pointer;
            display: none;
            font-size: 18px;
            z-index: 5;
        }

        .search-btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background-color: #ffcc00;
            color: #228B22;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .profile-card { 
            max-width: 800px; 
            margin: 100px auto 40px; 
            background: white; 
            padding: 60px 30px 30px;
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            position: relative;
            width: 92%;
        }

        .photo-container {
            width: 140px;
            height: 140px;
            margin: -130px auto 15px;
            border-radius: 50%;
            border: 5px solid white;
            background: #eef2f3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .student-photo { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #fff;
        }

        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-top: 30px; 
            text-align: left; 
        }

        .info-item { padding: 10px; border-bottom: 1px solid #eee; }
        .info-item label { font-size: 11px; color: #888; display: block; text-transform: uppercase; }
        .info-item span { font-weight: bold; color: #333; word-break: break-word; }
        
        .status-badge { 
            padding: 5px 15px; border-radius: 20px; font-size: 12px; 
            background: #f0f0f0; color: #666; font-weight: bold; 
        }

        /* FIXED: Added display: none here to ensure it is hidden at start */
        #attendanceAlert {
            display: none; 
            background-color: #fff3f3; 
            color: #c62828; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid #c62828; 
            margin: 20px 0; 
            text-align: left; 
            font-size: 14px;
        }

        .print-only-header { display: none; }

        @media screen and (min-width: 769px) {
            .header-logo-box { position: absolute; left: 20px; top: 15px; }
            .profile-header { padding-top: 100px; }
        }

        @media screen and (max-width: 768px) {
            .profile-card { margin-top: 130px; padding: 60px 20px 20px; }
            .header-logo-box img { height: 70px; }
            .header-logo-box h1 { font-size: 26px; }
        }

        @media print {
            body { background: white !important; }
            .profile-header, button, .search-container, #clearBtn, .search-btn, a, .portal-title {
                display: none !important;
            }
            .print-only-header {
                display: flex !important;
                flex-direction: column;
                align-items: center;
            }
            .profile-card {
                margin: 20px auto !important;
                box-shadow: none !important;
                border: 1px solid #eee !important;
                width: 98% !important;
                padding: 40px 20px !important;
            }
            .photo-container {
                margin: 20px auto !important;
                border: 2px solid #228B22 !important;
            }
            .student-photo { object-fit: contain !important; }
        }
    </style>
</head>
<body>

<div class="profile-header">
    <a href="index.html" class="header-logo-box">
        <img src="logo.png" alt="School Logo">
        <div style="text-align: left;">
            <h1>Paramount</h1>
            <p>ENGLISH MEDIUM SCHOOL</p>
        </div>
    </a>

    <div class="search-container">
        <div class="input-wrapper">
            <input type="text" id="rollNumberInput" placeholder="Enter Roll Number" oninput="toggleClearBtn()">
            <span id="clearBtn" onclick="clearSearch()">
                <i class="fas fa-times-circle"></i>
            </span>
        </div>
        <button onclick="searchStudent()" class="search-btn">
            <i class="fas fa-search"></i>
        </button>
    </div>
</div>

<h1 class="portal-title" style="text-align: center; color: #228B22; margin: 40px 0 0; font-size: 38px; text-transform: uppercase; letter-spacing: 3px; font-weight: 800;">
    Student Portal
</h1>

<div class="profile-card">
    <div class="print-only-header">
        <img src="logo.png" alt="Logo" style="height: 100px; width: auto; margin-bottom: 10px;">
        <h1 style="margin: 0; color: #228B22; text-transform: uppercase; font-size: 36px;">Paramount English Medium School</h1>
        <p style="margin: 5px 0; font-weight: bold; color: #666;">Official Student Record - 2026-27</p>
    </div>

    <div style="text-align: center;">
        <div class="photo-container">
            <img id="studentPhoto" src="logo.png" alt="Student Photo" class="student-photo">
        </div>
        <h2 id="studentName" style="margin: 10px 0 5px;">Student Name</h2>
        <span class="status-badge" id="statusBadge">Search to View Status</span>
    </div>

    <div id="attendanceAlert">
        <i class="fas fa-exclamation-triangle"></i> 
        <strong>Low Attendance Warning:</strong> Parent/Guardian intervention is required for this student.
    </div>

    <div class="info-grid">
        <div class="info-item"><label>Class / Section</label><span id="studentClass">---</span></div>
        <div class="info-item"><label>Father's Name</label><span id="fatherName">---</span></div>
        <div class="info-item"><label>Attendance</label><span id="attendanceRate">---</span></div>
        <div class="info-item"><label>Roll Number</label><span id="RollNumber">---</span></div>
        <div class="info-item"><label>Parent Phone</label><span id="PhoneNumber">---</span></div>
        <div class="info-item"><label>Gender</label><span id="studentGender">---</span></div>
    </div>
    
    <div style="margin-top: 40px; text-align: center; display: flex; flex-direction: column; gap: 15px; align-items: center;">
        <button onclick="downloadReport()" style="padding: 12px 25px; border-radius: 30px; border: none; background-color: #228B22; color: white; font-weight: bold; cursor: pointer; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <i class="fas fa-file-download"></i> Download Report (PDF)
        </button>

        <a href="index.html" style="text-decoration: none; color: #228B22; font-weight: bold;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</div>

<script>
const studentData = {
    "2203A51618": {
        name: "Shaik Tauseef Ali",
        class: "10th Grade - A",
        father: "Mr. Shaik Ahmad",
        attendance: "95%",
        roll: "2203A51618",
        phonenumber: "9550791538",
        gender: "Boy"
    },
    "2203A51611": {
        name: "Shaik Minhaj Ali",
        class: "9th Grade - B",
        father: "Mr. Shaik Ahmad",
        attendance: "42%", 
        roll: "2203A51611",
        phonenumber: "8341039583",
        gender: "Boy"
    }
};

function toggleClearBtn() {
    const input = document.getElementById('rollNumberInput');
    const clearBtn = document.getElementById('clearBtn');
    clearBtn.style.display = input.value.length > 0 ? "block" : "none";
}

function clearSearch() {
    const input = document.getElementById('rollNumberInput');
    input.value = "";
    toggleClearBtn();
    input.focus();
}

function downloadReport() {
    const name = document.getElementById('studentName').innerText;
    if (name === "Student Name" || name === "---") {
        alert("Please search for a student first.");
        return;
    }
    window.print();
}

function searchStudent() {
    const input = document.getElementById('rollNumberInput').value.trim();
    const student = studentData[input];
    const alertBox = document.getElementById('attendanceAlert');
    const photoImg = document.getElementById('studentPhoto');

    if (student) {
        photoImg.src = `students/${student.roll}.jpg`;
        photoImg.onerror = function() { this.src = 'logo.png'; };

        document.getElementById('studentName').innerText = student.name;
        document.getElementById('studentClass').innerText = student.class;
        document.getElementById('fatherName').innerText = student.father;
        document.getElementById('attendanceRate').innerText = student.attendance;
        document.getElementById('RollNumber').innerText = student.roll;
        document.getElementById('PhoneNumber').innerText = student.phonenumber;
        document.getElementById('studentGender').innerText = student.gender;

        const attendanceValue = parseInt(student.attendance);
        const statusBadge = document.getElementById('statusBadge');

        // Logic to show/hide alert based on actual attendance
        if (attendanceValue < 50) {
            statusBadge.innerText = "Inactive Student";
            statusBadge.style.background = "#ffebee";
            statusBadge.style.color = "#c62828";
            alertBox.style.display = "block";
        } else {
            statusBadge.innerText = "Active Student";
            statusBadge.style.background = "#e8f5e9";
            statusBadge.style.color = "#2e7d32";
            alertBox.style.display = "none";
        }
    } else {
        alert("Roll Number not found.");
    }
}
</script>
</body>
</html>
