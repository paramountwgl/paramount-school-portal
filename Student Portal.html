<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Portal | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #ef4444; --light: #f4f7f6; --paid: #4caf50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); overflow-x: hidden; width: 100%; padding-bottom: 120px; }
        
        /* NAVIGATION BAR (Yellow/Gold Buttons) */
        .portal-nav { background: #004d26; padding: 15px 5px; display: flex; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 2000; overflow-x: auto; scrollbar-width: none; }
        .portal-nav a { color: white; text-decoration: none; font-weight: 700; font-size: 11px; padding: 8px 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .portal-nav a.active { background: var(--gold); color: var(--forest); border: 1px solid var(--gold); }
        .portal-nav a.highlight { background: var(--gold); color: var(--forest); border: 1px solid var(--gold); }

        /* HEADER */
        .profile-header { background: var(--forest); color: white; padding: 40px 15px; text-align: center; }
        .header-logo-box { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 25px; }
        .header-logo-box img { height: 70px; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 1px; display: block; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: 11px; color: var(--gold); font-weight: 700; text-transform: uppercase; }

        /* SEARCH BOX */
        .search-container { width: 100%; max-width: 500px; margin: 0 auto; display: flex; gap: 8px; position: relative; top: -20px; }
        #rollNumberInput { flex: 1; padding: 15px 25px; border-radius: 40px; border: none; outline: none; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-btn { background: var(--gold); color: var(--forest); border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* COUNTDOWN SECTION - MATCHING SCREENSHOT */
        #countdownSection { display: flex; gap: 20px; padding: 20px; overflow-x: auto; justify-content: center; scrollbar-width: none; background: var(--light); }
        #countdownSection::-webkit-scrollbar { display: none; }
        
        .event-timer-card { background: white; border-radius: 35px; padding: 30px 20px; min-width: 340px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); text-align: center; flex: 0 0 auto; }
        .event-timer-card h3 { margin: 0; font-family: 'Montserrat'; font-size: 20px; color: var(--forest); text-transform: uppercase; font-weight: 900; }
        .event-timer-card p { margin: 5px 0 20px; font-size: 12px; color: #666; font-weight: 700; }
        
        .timer-grid { display: flex; gap: 10px; justify-content: center; }
        .t-block { background: var(--forest); color: white; padding: 12px; border-radius: 12px; min-width: 65px; display: flex; flex-direction: column; align-items: center; }
        .t-block span { font-size: 22px; font-weight: 900; display: block; line-height: 1; }
        .t-block label { font-size: 8px; text-transform: uppercase; color: var(--gold); font-weight: 800; margin-top: 4px; }

        /* PROFILE CARD & STAMP */
        .profile-card { max-width: 750px; margin: 40px auto 30px auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 92%; position: relative; }
        .registered-stamp { position: absolute; top: 15px; right: 15px; background: rgba(76, 175, 80, 0.1); color: #2e7d32; padding: 8px 12px; border: 2px dashed #4caf50; border-radius: 8px; font-family: 'Montserrat'; font-weight: 800; font-size: 10px; text-transform: uppercase; transform: rotate(10deg); display: none; }

        /* FINANCE & ATTENDANCE */
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; text-align: left; }
        .info-item { padding: 12px; background: #fcfdfc; border-radius: 12px; border: 1px solid #f0f0f0; }
        .info-item label { font-size: 9px; font-weight: 800; color: #999; text-transform: uppercase; display: block; }
        .info-item span { font-weight: 700; color: #222; font-size: 14px; margin-top: 3px; display: block; }

        #feeSection { margin-top: 30px; display: none; border-top: 2px dashed #eee; padding-top: 20px; }
        .fee-stats-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card-mini { padding: 12px 8px; border-radius: 15px; background: #f8fafc; border: 1px solid #f0f0f0; text-align: center; }
        .stat-card-mini span { font-size: 13px; font-weight: 800; display: block; margin-top: 4px; }

        /* FOOTER RETURN */
        .return-footer { text-align: center; padding: 20px; margin-top: 20px; }
        .return-footer a { color: var(--forest); text-decoration: none; font-weight: 800; font-size: 13px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; }

        /* SWAL CLOSE BUTTON FIX */
        .swal2-close { font-size: 30px !important; color: #666 !important; outline: none !important; }
        .premium-reg-btn { background: var(--forest) !important; color: white !important; padding: 15px 35px !important; border-radius: 50px !important; font-weight: 800 !important; font-family: 'Montserrat' !important; margin-top: 10px !important; border: none !important; }
    </style>
</head>
<body>

<div class="portal-nav" id="mainNav">
    <a href="#" class="active"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="homework.html"><i class="fas fa-book-open"></i> Homework</a>
    <a href="progres.html"><i class="fas fa-chart-line"></i> Progress</a>
    <a href="student-halltickets.html"><i class="fas fa-id-card"></i> Hall Tickets</a>
    <a href="syllabus-student-view.html"><i class="fas fa-book-open"></i> View Syllabus</a>
    <a href="event-signup.html" class="highlight"><i class="fas fa-crown"></i> Events Registration</a>
</div>

<div id="printableArea">
    <div class="profile-header">
        <div class="header-logo-box">
            <img src="logo.png" alt="Logo">
            <div class="school-text">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>
        </div>
    </div>

    <div class="search-container" id="searchBoxForPdf">
        <input type="text" id="rollNumberInput" placeholder="Enter Roll Number" onkeypress="if(event.key === 'Enter') searchStudent();">
        <button onclick="searchStudent();" class="search-btn"><i class="fas fa-search"></i></button>
    </div>

    <div id="countdownSection"></div>

    <div class="profile-card">
        <div id="regStamp" class="registered-stamp"><i class="fas fa-check-circle"></i> Successfully Registered</div>
        <div class="photo-container"><img id="studentPhoto" src="logo.png" class="student-photo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';"></div>
        <h2 id="studentName" style="color: var(--forest); margin: 0; font-weight: 900; text-transform: uppercase;">STUDENT NAME</h2>
        <div id="statusBadge" class="status-badge">AWAITING ROLL NUMBER</div>

        <div class="info-grid">
            <div class="info-item"><label>Class / Section</label><span id="studentClass">---</span></div>
            <div class="info-item"><label>Roll Number</label><span id="RollNumber">---</span></div>
            <div class="info-item"><label>Admission No</label><span id="admissionNo">---</span></div>
            <div class="info-item"><label>Father's Name</label><span id="fatherName">---</span></div>
            <div class="info-item"><label>Live Attendance % (Present/Total)</label><span id="attendanceRate">---</span></div>
            <div class="info-item"><label>Parent Phone</label><span id="phoneNumber">---</span></div>
        </div>

        <div id="feeSection">
            <div class="fee-stats-triple">
                <div class="stat-card-mini"><label>Total Fee</label><span id="vTotalFee">₹ 0</span></div>
                <div class="stat-card-mini"><label>Total Paid</label><span id="vPaidFee" style="color: var(--paid);">₹ 0</span></div>
                <div class="stat-card-mini" style="background:#fff1f2;"><label>Due</label><span id="vDueFee" style="color: var(--danger);">₹ 0</span></div>
            </div>
        </div>

        <div class="pdf-btn-container" id="pdfBtnSection">
            <button onclick="downloadPDF()" class="pdf-btn"><i class="fas fa-file-pdf"></i> DOWNLOAD REPORT</button>
        </div>
    </div>
</div>

<div class="return-footer" id="bottomNav">
    <a href="index.html"><i class="fas fa-home"></i> Return to Dashboard</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// Firebase & Data Fetching (Keep your existing firebaseConfig and searchStudent logic)
const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// [Insert studentData JSON here]

async function searchStudent() {
    const rollNo = document.getElementById('rollNumberInput').value.trim();
    const student = studentData[rollNo];
    if (student) {
        document.getElementById('studentName').innerText = student.Name;
        document.getElementById('studentClass').innerText = student.Class;
        document.getElementById('RollNumber').innerText = student.Roll;
        document.getElementById('admissionNo').innerText = student.Adm;
        document.getElementById('fatherName').innerText = student.Father;
        document.getElementById('phoneNumber').innerText = student.Phone;
        document.getElementById('studentPhoto').src = `students/${student.Roll}.png`;
        
        // Fetch Attendance & Finance from Firebase (using same logic as previous turn)
        const shortClass = student.Class.split(" ")[0]; 
        const attSnap = await db.ref('daily_attendance').once('value');
        let totalP = 0, totalT = 0;
        if(attSnap.exists()){
            const allData = attSnap.val();
            Object.keys(allData).forEach(date => {
                if(allData[date][shortClass] && allData[date][shortClass][student.Name] !== undefined) {
                    totalT++; if(allData[date][shortClass][student.Name] === true) totalP++;
                }
            });
        }
        document.getElementById('attendanceRate').innerText = `${totalT > 0 ? Math.round((totalP/totalT)*100) : 0}% (${totalP}/${totalT})`;

        const feeSnap = await db.ref(`fee_records/${student.Class}/${student.Name}`).once('value');
        let tPaid = 0, tFee = 0;
        if(feeSnap.exists()){
            feeSnap.forEach(c => { const d = c.val(); tPaid += parseFloat(d.paid || 0); tFee = parseFloat(d.total || 0); });
        }
        document.getElementById('vTotalFee').innerText = "₹ " + tFee;
        document.getElementById('vPaidFee').innerText = "₹ " + tPaid;
        document.getElementById('vDueFee').innerText = "₹ " + (tFee - tPaid);
        
        document.getElementById('feeSection').style.display = 'block';
        document.getElementById('pdfBtnSection').style.display = 'flex';
        document.getElementById('statusBadge').innerText = "PROFILE ACTIVE";
        checkEventStatus(rollNo);
    }
}

// Countdown Logic - Matches Screenshot Positioning
let dynamicEvents = [];
db.ref('school_events').on('value', snap => {
    dynamicEvents = [];
    if (snap.exists()) { snap.forEach(child => dynamicEvents.push(child.val())); }
    updateCountdown(); 
});

function updateCountdown() {
    const now = new Date().getTime();
    const container = document.getElementById('countdownSection');
    const activeEvents = dynamicEvents.filter(ev => new Date(ev.date).getTime() > now).sort((a, b) => new Date(a.date) - new Date(b.date));

    let htmlContent = "";
    activeEvents.forEach((ev) => {
        const diff = new Date(ev.date).getTime() - now;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

        htmlContent += `
            <div class="event-timer-card">
                <h3>${ev.name}</h3>
                <p>join the club today</p>
                <div class="timer-grid">
                    <div class="t-block"><span>${d}</span><label>Days</label></div>
                    <div class="t-block"><span>${h}</span><label>Hrs</label></div>
                    <div class="t-block"><span>${m}</span><label>Min</label></div>
                    <div class="t-block"><span>${s}</span><label>Sec</label></div>
                </div>
            </div>`;
    });
    container.innerHTML = htmlContent;
}

// Popup Logic with Added X (Close) Button
async function triggerSpecificPopup(eventName) {
    const ev = dynamicEvents.find(e => e.name === eventName);
    if (!ev || !ev.isRegistration) return;

    Swal.fire({
        showCloseButton: true, // ADDED THE X BUTTON
        title: `<div style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 5px 0 8px;"><img src="logo.png" style="height: 38px;"><div style="text-align: left; line-height: 1;"><div style="font-family: 'Montserrat'; font-size: 16px; font-weight: 900; color: #004d26;">PARAMOUNT</div><div style="font-family: 'Montserrat'; font-size: 7px; font-weight: 700; color: #b8860b;">English Medium School</div></div></div>`,
        html: `<div style="text-align: center; font-family: 'Segoe UI', sans-serif;"><h2 style="margin: 5px 0; font-family: 'Montserrat'; font-size: 18px; font-weight: 900; color: #1a1a1a; text-transform: uppercase;">${ev.name}</h2><p style="color: #666; font-size: 11px; margin-bottom: 10px;">${ev.desc || "Sign up now!"}</p></div>`,
        confirmButtonText: 'REGISTER NOW',
        customClass: { confirmButton: 'premium-reg-btn' },
        buttonsStyling: false
    }).then((result) => { if (result.isConfirmed) { window.location.href = `event-signup.html?event=${encodeURIComponent(ev.name)}`; } });
}

setInterval(updateCountdown, 1000);
</script>
</body>
</html>
