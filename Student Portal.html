        /* NAVIGATION BAR */

        .portal-nav a.active { background: rgba(255,255,255,0.2); border: 1px solid var(--gold); }
        .portal-nav a:hover { color: var(--gold); background: rgba(255,255,255,0.1); }

        /* LIVE ANNOUNCEMENT BANNER - RESTORED */
        .announcement-banner { background: var(--danger); color: white; text-align: center; padding: 10px 15px; font-weight: 800; font-size: 13px; display: none; position: sticky; top: 48px; z-index: 1999; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-transform: uppercase; }
        .announcement-banner i { margin-right: 8px; animation: blink 1s infinite alternate; color: var(--gold); }
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0.4; } }

        /* HEADER STYLING */
        .profile-header { background: var(--forest); color: white; padding: 30px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; }
        .header-logo-box { display: flex; align-items: center; gap: 18px; text-decoration: none; color: white; margin-bottom: 25px; }
        .header-logo-box img { height: clamp(65px, 10vw, 90px); width: auto; }
        .header-logo-box h1 { margin: 0; font-size: clamp(1.6rem, 5.5vw, 2.4rem); text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; }
        .header-logo-box p { margin: 0; font-size: 13px; color: var(--gold); font-weight: 700; text-align: left; }
        
        /* SEARCH BOX */
        .search-container { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; max-width: 550px; }
        #rollNumberInput { padding: 15px 25px; border-radius: 35px; border: 2px solid transparent; width: 100%; font-size: 16px; outline: none; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: 0.3s; }
        #rollNumberInput:focus { border-color: var(--gold); }
        .search-btn { padding: 14px 28px; border-radius: 35px; border: none; background-color: var(--gold); color: var(--forest); font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .search-btn:hover { transform: scale(1.05); background-color: white; }

        .portal-title { text-align: center; color: var(--forest); margin: 40px 0 30px 0; font-size: 32px; font-weight: 900; }

        /* PROFILE CARD */
        .profile-card { max-width: 750px; margin: 0 auto 50px auto; background: white; padding: 70px 35px 35px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); position: relative; width: 92%; border-bottom: 5px solid var(--forest); }
        .photo-container { width: 140px; height: 140px; margin: -140px auto 20px; border-radius: 50%; border: 6px solid white; background: #f8f9fa; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .student-photo { width: 100%; height: 100%; object-fit: cover; }
        
        /* INFO GRID */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 25px; border-top: 2px solid #f8f8f8; padding-top: 30px; }
        .info-item { padding: 15px; background: #fcfcfc; border-radius: 12px; border: 1px solid #f0f0f0; }
        .info-item label { font-size: 10px; color: #888; display: block; text-transform: uppercase; font-weight: 800; margin-bottom: 6px; }
        .info-item span { font-weight: 700; color: #222; font-size: 15px; display: block; }
        .attendance-highlight { background: #e8f5e9 !important; border: 1px solid #c8e6c9 !important; }
        .status-badge { padding: 8px 22px; border-radius: 25px; font-size: 13px; background: #f0f0f0; font-weight: 800; display: inline-block; margin-top: 10px; text-transform: uppercase; border: 1px solid transparent; }

        .pdf-btn-container { text-align: center; margin-top: 40px; display: none; }
        .pdf-btn { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 14px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,102,51,0.2); }

        /* PREMIUM BOTTOM NAV & BUTTON */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: white; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }

            background: linear-gradient(135deg, var(--forest), #004d26);

            font-weight: 800; 
            text-decoration: none; 
            font-size: 15px; 
            border: 2px solid var(--gold);

            display: inline-flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0, 102, 51, 0.3);
        }
        .btn-return:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 102, 51, 0.5); }

function searchStudent() {
    const rollNo = document.getElementById('rollNumberInput').value.trim();
    const student = studentData[rollNo];
    
    if (student) {
        document.getElementById('studentName').innerText = student.Name;
        document.getElementById('studentClass').innerText = student.Class;
        document.getElementById('RollNumber').innerText = student.Roll;
        document.getElementById('admissionNo').innerText = student.AdmissionNo;
        document.getElementById('fatherName').innerText = student.Father;
        document.getElementById('studentDob').innerText = student.Dob;
        document.getElementById('PhoneNumber').innerText = student.Phonenumber;
        document.getElementById('studentGender').innerText = student.Gender;
        document.getElementById('studentPhoto').src = `students/${student.Roll}.png`;
        
        const status = document.getElementById('statusBadge');
        
        // FIXED ATTENDANCE MATH
        const shortClass = student.Class.split(" ")[0]; // Get exactly "Grade-8", etc.
        
        db.ref('daily_attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let totalP = 0, totalT = 0;
            
            Object.keys(allData).forEach(date => {
                const classData = allData[date][shortClass];
                if(classData && classData[student.Name] !== undefined) {
                    totalT++; 
                    if(classData[student.Name] === true) {
                        totalP++;
                    }
                }
            });
            
            const percent = totalT > 0 ? Math.round((totalP / totalT) * 100) : 0;
            document.getElementById('attendanceRate').innerText = `${percent}% (${totalP}/${totalT} Days)`;

            // ACTIVE / INACTIVE BADGE STYLING
            if(totalT === 0) {
                status.innerText = "NO DATA YET";
                status.style.background = "#f0f0f0";
                status.style.color = "#888";
                status.style.border = "1px solid transparent";
            } else if (percent >= 75) {
                status.innerText = "ACTIVE";
                status.style.background = "#e8f5e9";
                status.style.color = "var(--forest)";
                status.style.border = "1px solid #c8e6c9";
            } else {
                status.innerText = "INACTIVE";
                status.style.background = "#ffebee";
                status.style.color = "var(--danger)";
                status.style.border = "1px solid #ffcdd2";
            }
        });

        document.getElementById('pdfBtnSection').style.display = 'block';
    } else { 
        Swal.fire('Error', 'Student not found.', 'error'); 
    }
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const name = document.getElementById('studentName').innerText;
    doc.setFontSize(20); doc.setTextColor(0, 102, 51); doc.text("PARAMOUNT SCHOOL", 105, 20, { align: "center" });
    doc.save(`${name}_Report.pdf`);
}

// THIS MAKES THE ANNOUNCEMENT POP UP FOR PARENTS
db.ref('announcement').on('value', (snap) => {
    const msg = snap.val();
    const banner = document.getElementById('liveAnnouncementBanner');
    if (msg && banner) { 
        document.getElementById('announcementMessageText').innerText = msg; 
        banner.style.display = 'block'; 
    } else if (banner) { 
        banner.style.display = 'none'; 
    }
});
