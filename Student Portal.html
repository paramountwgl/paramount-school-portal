        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); overflow-x: hidden; width: 100%; padding-bottom: 120px; }

        

        /* NAVIGATION */

        .portal-nav { background: #004d26; padding: 12px 5px; display: flex; justify-content: center; gap: 5px; position: sticky; top: 0; z-index: 2000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); overflow-x: auto; }

        .portal-nav a { color: white; text-decoration: none; font-weight: bold; font-size: 11px; padding: 8px 12px; border-radius: 25px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }

        .portal-nav a.active { background: rgba(255,255,255,0.2); border: 1px solid var(--gold); color: var(--gold); }



        /* HEADER */

        .profile-header { background: var(--forest); color: white; padding: 25px 15px; border-bottom: 4px solid var(--gold); text-align: center; }

        .header-logo-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }

        .header-logo-box img { height: 60px; }

        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }

        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 1px; color: white; }

        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }



        /* COUNTDOWN SECTION */

        #countdownSection { display: flex; gap: 20px; padding: 20px; overflow-x: auto; justify-content: center; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }

        .event-timer-card { background: white; border-radius: 25px; padding: 20px; min-width: 320px; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-bottom: 5px solid var(--gold); text-align: center; transition: 0.3s; flex: 0 0 auto; }

        .event-timer-card h3 { margin: 0; font-family: 'Montserrat'; font-size: 18px; color: var(--forest); text-transform: uppercase; font-weight: 800; }

        .timer-grid { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }

        .t-block { background: var(--forest); color: white; padding: 10px; border-radius: 12px; min-width: 55px; }

        .t-block span { display: block; font-size: 20px; font-weight: 900; }

        .t-block label { font-size: 9px; text-transform: uppercase; color: var(--gold); font-weight: 700; }



        /* PROFILE LOOKUP */

        .search-container { width: 100%; max-width: 500px; margin: 0 auto; display: flex; gap: 8px; }

        #rollNumberInput { flex: 1; padding: 12px 20px; border-radius: 30px; border: none; outline: none; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .search-btn { background: var(--gold); color: var(--forest); border: none; padding: 0 20px; border-radius: 30px; font-weight: 800; cursor: pointer; }

        

        .profile-card { max-width: 750px; margin: 60px auto 30px auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 92%; position: relative; }

        .photo-container { width: 110px; height: 110px; margin: -60px auto 15px auto; border-radius: 50%; border: 5px solid white; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #eee; }

        .student-photo { width: 100%; height: 100%; object-fit: cover; }

        

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; text-align: left; }

        .info-item { padding: 12px; background: #fcfdfc; border-radius: 12px; border: 1px solid #f0f0f0; }

        .info-item label { font-size: 9px; font-weight: 800; color: #999; text-transform: uppercase; display: block; }

        .info-item span { font-weight: 700; color: #222; font-size: 14px; margin-top: 3px; display: block; }

        .status-badge { padding: 6px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; background: #eee; display: inline-block; margin-top: 10px; text-transform: uppercase; }



        /* FINANCE SECTION */

        #feeSection { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #f0f0f0; text-align: left; display: none; }

        .fee-progress-box { display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 20px; position: relative; }

        .circle-svg { width: 120px; height: 120px; transform: rotate(-90deg); }

        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 10; }

        .circle-bar { fill: none; stroke: var(--paid); stroke-width: 10; stroke-dasharray: 314.15; stroke-dashoffset: 314.15; transition: 1.5s ease-out; stroke-linecap: round; }

        .circle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }

        #feePercentLabel { font-weight: 800; font-size: 1.4rem; color: #1e293b; display: block; }

        

        .fee-stats-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }

        .stat-card-mini { padding: 12px 8px; border-radius: 15px; background: white; border: 1px solid #f0f0f0; text-align: center; }

        .stat-card-mini label { font-size: 8px; font-weight: 800; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 4px; }

        .stat-card-mini span { font-size: 13px; font-weight: 800; display: block; }



        /* PDF BUTTON */

        .pdf-btn-container { display: none; justify-content: center; width: 100%; margin-top: 30px; }

        .pdf-btn { background: var(--forest); color: white; border: none; padding: 16px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }



        .btn-return { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--forest); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; border: 2px solid var(--gold); z-index: 1000; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }



        @media (min-width: 768px) { .info-grid { grid-template-columns: 1fr 1fr; } }

    </style>

</head>

function playPing() {

    try {

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const oscillator = audioCtx.createOscillator();

        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

        gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);

        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

        oscillator.start(audioCtx.currentTime); oscillator.stop(audioCtx.currentTime + 0.5);

    } catch(e) {}

}



async function searchStudent() {

    const rollNo = document.getElementById('rollNumberInput').value.trim();

    const student = studentData[rollNo];

    if (student) {

        document.getElementById('studentName').innerText = student.Name;

        document.getElementById('studentClass').innerText = student.Class;

        document.getElementById('RollNumber').innerText = student.Roll;

        document.getElementById('admissionNo').innerText = student.Adm;

        document.getElementById('fatherName').innerText = student.Father;

        document.getElementById('phoneNumber').innerText = student.Phone;

        document.getElementById('studentPhoto').src = `students/${student.Roll}.png?t=${new Date().getTime()}`;

        document.getElementById('pdfBtnSection').style.display = 'flex';

        document.getElementById('statusBadge').innerText = "PROFILE ACTIVE";

        document.getElementById('statusBadge').style.background = "#e8f5e9";

        document.getElementById('statusBadge').style.color = "#006633";



        // Attendance Logic

        const shortClass = student.Class.split(" ")[0]; 

        const attSnap = await db.ref('daily_attendance').once('value');

        let totalP = 0, totalT = 0;

        if(attSnap.exists()){

            const allData = attSnap.val();

            Object.keys(allData).forEach(date => {

                if(allData[date][shortClass] && allData[date][shortClass][student.Name] !== undefined) {

                    totalT++; if(allData[date][shortClass][student.Name] === true) totalP++;

                }

            });

        }

        const pct = totalT > 0 ? Math.round((totalP/totalT)*100) : 0;

        document.getElementById('attendanceRate').innerText = `${pct}% (${totalP}/${totalT})`;



        // Finance Logic

        const feeSnap = await db.ref(`fee_records/${student.Class}/${student.Name}`).once('value');

        let tPaid = 0, tFee = 0;

        if(feeSnap.exists()){

            feeSnap.forEach(c => { const d = c.val(); tPaid += parseFloat(d.paid || 0); tFee = parseFloat(d.total || 0); });

        }

        const feePct = tFee > 0 ? Math.round((tPaid/tFee)*100) : 0;

        document.getElementById('vTotalFee').innerText = "₹ " + tFee;

        document.getElementById('vPaidFee').innerText = "₹ " + tPaid;

        document.getElementById('vDueFee').innerText = "₹ " + (tFee - tPaid);

        document.getElementById('feePercentLabel').innerText = feePct + "%";

        document.getElementById('feeCircle').style.strokeDashoffset = 314.15 - (314.15 * feePct / 100);

        document.getElementById('feeSection').style.display = 'block';



        checkEventStatus(rollNo);

    } else { Swal.fire('Error', 'Roll Number not found.', 'error'); }

}



async function checkEventStatus(rollNo) {

    const stamp = document.getElementById('regStamp');

    const eventSnap = await db.ref('school_events').limitToLast(1).once('value');

    let latestName = "";

    eventSnap.forEach(c => latestName = c.val().name);

    if (latestName) {

        const regCheck = await db.ref(`event_registrations/${latestName}/${rollNo}`).once('value');

        if (regCheck.exists()) {

            stamp.style.display = 'block';

            stamp.innerHTML = `<i class="fas fa-check-circle"></i> Registered: ${latestName}`;

        } else { stamp.style.display = 'none'; }

    }

}



let dynamicEvents = [];

let hasPromptedEvent = false;



db.ref('school_events').on('value', snap => {

    dynamicEvents = [];

    if (snap.exists()) { snap.forEach(child => { dynamicEvents.push(child.val()); }); }

    updateCountdown(); 

    checkAndShowPopup();

});



function updateCountdown() {

    const now = new Date().getTime();

    const container = document.getElementById('countdownSection');

    const activeEvents = dynamicEvents.filter(ev => new Date(ev.date).getTime() > now).sort((a, b) => new Date(a.date) - new Date(b.date));



    if (activeEvents.length === 0) {

        container.innerHTML = ""; container.style.display = "none"; return;

    }



    container.style.display = "flex";

    let htmlContent = "";

    activeEvents.forEach((ev) => {

        const diff = new Date(ev.date).getTime() - now;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');

        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');

        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');

        const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');



        htmlContent += `<div class="event-timer-card"><h3>${ev.name}</h3><p style="font-size: 11px; color: #666; font-weight: bold; margin: 5px 0 15px;">${ev.desc || 'Stay Prepared!'}</p><div class="timer-grid"><div class="t-block"><span>${d}</span><label>Days</label></div><div class="t-block"><span>${h}</span><label>Hrs</label></div><div class="t-block"><span>${m}</span><label>Min</label></div><div class="t-block"><span>${s}</span><label>Sec</label></div></div></div>`;

    });

    container.innerHTML = htmlContent;

}



async function checkAndShowPopup() {

    if (!hasPromptedEvent && dynamicEvents.length > 0) {

        const now = new Date().getTime();

        const nextEvent = dynamicEvents.filter(ev => ev.isRegistration === true && new Date(ev.regDeadline).getTime() > now).sort((a, b) => new Date(a.date) - new Date(b.date))[0];



        if (nextEvent) {

            const regSnap = await db.ref(`event_registrations/${nextEvent.name}`).once('value');

            const count = regSnap.exists() ? Object.keys(regSnap.val()).length : 0;

            const diffDays = Math.ceil((new Date(nextEvent.regDeadline).getTime() - now) / (1000 * 60 * 60 * 24));

            hasPromptedEvent = true; 

            showEventInvitation(nextEvent.name, nextEvent.desc, diffDays, count);

        }

    }

}



function showEventInvitation(name, desc, daysLeft, count) {

    const isUrgent = daysLeft <= 2;

    const themeColor = isUrgent ? '#ef4444' : '#006633';

    const bgColor = isUrgent ? '#fff1f2' : '#f0fdf4';

    playPing();

    Swal.fire({

        title: `<div style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 5px 0 8px; border-bottom: 1px solid #eee;"><img src="logo.png" style="height: 38px; width: auto;"><div style="text-align: left; line-height: 1;"><div style="font-family: 'Montserrat'; font-size: 16px; font-weight: 900; color: #004d26; letter-spacing: 0.5px; text-transform: uppercase; margin:0;">PARAMOUNT</div><div style="font-family: 'Montserrat'; font-size: 7px; font-weight: 700; color: #b8860b; text-transform: uppercase; letter-spacing: 0.5px; margin:0; padding-top: 1px;">English Medium School</div></div></div>`,

        html: `<div style="text-align: center; font-family: 'Segoe UI', sans-serif; margin-top: 10px;"><p style="margin: 0; font-size: 8px; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 1.5px;">Exclusive Invitation</p><h2 style="margin: 3px 0; font-family: 'Montserrat'; font-size: 19px; font-weight: 900; color: #1a1a1a; text-transform: uppercase; line-height: 1.1;">${name}</h2><p style="color: #666; font-size: 11px; font-weight: 500; margin-bottom: 10px; line-height: 1.2;">${desc || "Participate and showcase your talent!"}</p><div style="background: #f8fafc; border-radius: 6px; padding: 5px; margin-bottom: 8px; border: 1px solid #edf2f7;"><div style="color: #b8860b; font-weight: 800; font-size: 9px; text-transform: uppercase;"><i class="fas fa-users"></i> ${count > 0 ? `JOIN ${count} OTHERS REGISTERED!` : 'BE THE FIRST TO REGISTER!'}</div></div><div style="background: ${bgColor}; color: ${themeColor}; padding: 3px 12px; border-radius: 50px; display: inline-flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 800; border: 1px solid ${themeColor}22;"><i class="fas fa-clock ${isUrgent ? 'fa-beat' : ''}"></i> CLOSES IN ${daysLeft} DAYS</div></div><style>.swal2-popup { border-radius: 20px !important; padding: 15px !important; width: 330px !important; }.swal2-title, .swal2-html-container { margin: 0 !important; padding: 0 !important; }.swal2-close { font-size: 18px !important; top: 8px !important; right: 8px !important; }.premium-reg-btn { background: #004d26 !important; color: white !important; border: none !important; padding: 10px 0 !important; border-radius: 50px !important; font-weight: 800 !important; font-size: 11px !important; text-transform: uppercase !important; letter-spacing: 0.5px !important; display: flex !important; align-items: center !important; justify-content: center !important; gap: 6px !important; transition: 0.2s ease-in-out !important; box-shadow: 0 4px 10px rgba(0, 41, 21, 0.2) !important; margin: 12px auto 2px !important; width: 85% !important; cursor: pointer; }.premium-reg-btn:hover { transform: translateY(-2px) !important; box-shadow: 0 6px 12px rgba(0, 41, 21, 0.3) !important; background: #005a2d !important; }.premium-reg-btn i { font-size: 10px; color: #ffd700; }</style>`,

        showCloseButton: true,

        showConfirmButton: true,

        confirmButtonText: 'REGISTER MY NAME <i class="fas fa-chevron-right"></i>',

        customClass: { confirmButton: 'premium-reg-btn' },

        buttonsStyling: false,

        allowOutsideClick: false,

        width: '330px'

    }).then((result) => {

        if (result.isConfirmed) { window.location.href = `event-signup.html?event=${encodeURIComponent(name)}`; }

    });

}



setInterval(updateCountdown, 1000);



async function downloadPDF() {

    const roll = document.getElementById('RollNumber').innerText;

    document.querySelectorAll('#searchBoxForPdf, #pdfBtnSection, #mainNav, #bottomNav, #countdownSection').forEach(el => el.style.display = 'none');

    const canvas = await html2canvas(document.getElementById('printableArea'), { scale: 2 });

    const pdf = new jspdf.jsPDF('p', 'mm', 'a4');

    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);

    pdf.save(`Paramount_Report_${roll}.pdf`);

    location.reload();

}
