<!DOCTYPE html>

    <style>
        /* General Styles */
        :root { --primary: #003366; --secondary: #006633; --gold: #ffd700; --light: #f4f4f4; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; color: #333; overflow-x: hidden; }

        /* Responsive Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 70px; width: auto; }
        .school-name-box { display: flex; flex-direction: column; }
        .name-main { font-size: 1.4rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .name-sub { font-size: 0.8rem; font-weight: 700; color: var(--secondary); letter-spacing: 1px; }

        nav a { margin-left: 20px; text-decoration: none; color: var(--primary); font-weight: bold; font-size: 1rem; }

        /* Admissions Banner */
        .marquee-banner { background: var(--gold); color: var(--primary); padding: 8px 0; font-weight: bold; border-bottom: 2px solid var(--secondary); }

        /* Sections */
        .section-padding { padding: 60px 10%; }
        .chairman-section { display: flex; align-items: center; gap: 50px; background: var(--light); }
        .chairman-img { width: 350px; border-radius: 15px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .chairman-text { flex: 1; }

        .admissions-section { background: white; text-align: center; border-top: 4px solid var(--secondary); }

        /* Footer */
        footer { background: var(--primary); color: white; padding: 40px 5%; text-align: center; }
        .contact-links a { color: white; margin: 0 10px; text-decoration: none; font-weight: bold; display: inline-block; padding: 5px 0; }
        .whatsapp { color: #25D366 !important; }

        /* MOBILE VIEW ADAPTATION (Screens smaller than 768px) */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; }
            .logo-container { margin-bottom: 10px; text-align: center; }
            .logo-img { height: 55px; }
            .name-main { font-size: 1.1rem; }
            .name-sub { font-size: 0.65rem; }
            
            nav { width: 100%; display: flex; justify-content: space-around; padding-top: 10px; border-top: 1px solid #eee; }
            nav a { margin: 0; font-size: 0.85rem; }

            .section-padding { padding: 30px 5%; }
            .chairman-section { flex-direction: column; text-align: center; }
            .chairman-img { width: 90%; max-width: 280px; height: auto; }
            
            .map-frame { height: 300px !important; }
        }
    </style>
</head>
